function openTrainingsplanEditor(id) {
  editingTrainingsplanId = id;
  trainingsplaeneView = 'edit';
  renderTrainingsplaeneTab();
}

function closeTrainingsplanEditor() {
  trainingsplaeneView = 'list';
  editingTrainingsplanId = null;
  renderTrainingsplaeneTab();
}

function renderTrainingsplanEditor() {
  const tp = (db.trainingsplaene || []).find(x => x.id === editingTrainingsplanId);
  if (!tp) { closeTrainingsplanEditor(); return; }

  const totalDauer = computeTpDauer(tp);
  const totalItems = countTpItems(tp);

  const phasenHtml = (tp.phasen || []).map((p, pIdx) => {
    const phaseDauer = computePhaseDauer(p);
    const itemsHtml = (p.items || []).length === 0
      ? '<div class="tp-phase-empty">Noch keine Übungen in dieser Phase.</div>'
      : p.items.map((it, iIdx) => renderTpItem(it, pIdx, iIdx, p.items.length)).join('');
    return '<div class="tp-phase">' +
      '<div class="tp-phase-head">' +
        '<p class="tp-phase-name">' + esc(p.name) + '</p>' +
        '<span class="tp-phase-stats"><strong>' + phaseDauer + ' min</strong> · ' + (p.items || []).length + ' Übung' + ((p.items || []).length === 1 ? '' : 'en') + '</span>' +
      '</div>' +
      '<div class="tp-phase-body">' +
        itemsHtml +
        '<button class="tp-phase-add" data-add-phase="' + pIdx + '">+ Übung hinzufügen</button>' +
      '</div>' +
    '</div>';
  }).join('');

  const container = document.getElementById('tab-trainingsplaene');
  container.innerHTML =
    '<div class="tp-editor-top">' +
      '<button class="aufst-back-btn" id="tp-back">← Trainingspläne</button>' +
      '<input type="text" id="tp-name" value="' + esc(tp.name) + '" placeholder="Name">' +
      '<input type="date" id="tp-datum" value="' + esc(tp.datum) + '" title="Datum (optional)">' +
      '<div class="aufst-spacer"></div>' +
      '<div class="aufst-count"><strong>' + totalDauer + ' min</strong> · ' + totalItems + ' Übung' + (totalItems === 1 ? '' : 'en') + '</div>' +
      '<button class="btn btn-danger" id="tp-delete">Löschen</button>' +
    '</div>' +
    phasenHtml +
    '<div class="form-row" style="grid-template-columns: 1fr; margin-top: 18px;">' +
      '<label for="tp-notizen" style="margin-bottom: 4px;">Notizen zur Einheit</label>' +
      '<textarea id="tp-notizen" placeholder="Allgemeine Anmerkungen, Fokus der Einheit …">' + esc(tp.notizen || '') + '</textarea>' +
    '</div>';

  document.getElementById('tp-back').onclick = closeTrainingsplanEditor;
  document.getElementById('tp-delete').onclick = () => {
    if (!confirm('Trainingsplan "' + tp.name + '" wirklich löschen?')) return;
    db.trainingsplaene = db.trainingsplaene.filter(x => x.id !== tp.id);
    saveDb();
    closeTrainingsplanEditor();
  };

  const nameEl = document.getElementById('tp-name');
  nameEl.onblur = () => {
    const v = nameEl.value.trim() || 'Unbenannt';
    if (v !== tp.name) { tp.name = v; saveDb(); }
  };
  document.getElementById('tp-datum').onchange = (e) => {
    tp.datum = e.target.value;
    saveDb();
  };
  document.getElementById('tp-notizen').onblur = (e) => {
    const v = e.target.value.trim();
    if (v !== tp.notizen) { tp.notizen = v; saveDb(); }
  };

  container.querySelectorAll('[data-add-phase]').forEach(btn => {
    btn.onclick = () => {
      const pIdx = parseInt(btn.dataset.addPhase, 10);
      openPickerModal('Übung für „' + tp.phasen[pIdx].name + '" wählen', (ueb) => {
        tp.phasen[pIdx].items.push({ uebung_id: ueb.id, dauer_override: null, notiz: '' });
        saveDb();
        renderTrainingsplaeneTab();
      });
    };
  });

  container.querySelectorAll('[data-item-action]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const pIdx = parseInt(btn.dataset.pIdx, 10);
      const iIdx = parseInt(btn.dataset.iIdx, 10);
      const action = btn.dataset.itemAction;
      const items = tp.phasen[pIdx].items;
      if (action === 'up' && iIdx > 0) {
        [items[iIdx - 1], items[iIdx]] = [items[iIdx], items[iIdx - 1]];
      } else if (action === 'down' && iIdx < items.length - 1) {
        [items[iIdx + 1], items[iIdx]] = [items[iIdx], items[iIdx + 1]];
      } else if (action === 'del') {
        items.splice(iIdx, 1);
      }
      saveDb();
      renderTrainingsplaeneTab();
    };
  });

  container.querySelectorAll('[data-item-edit]').forEach(el => {
    el.onclick = () => {
      const pIdx = parseInt(el.dataset.pIdx, 10);
      const iIdx = parseInt(el.dataset.iIdx, 10);
      openItemModal(tp, pIdx, iIdx);
    };
  });
}

function renderTpItem(it, pIdx, iIdx, total) {
  const u = db.uebungen.find(x => x.id === it.uebung_id);
  if (!u) {
    return '<div class="tp-item">' +
      '<span class="tp-item-icon">⚠️</span>' +

      '</div>' +
      '<div class="tp-item-actions">' +
        '<button class="icon-btn" data-item-action="del" data-p-idx="' + pIdx + '" data-i-idx="' + iIdx + '" title="Entfernen">×</button>' +

      '<p class="tp-item-name">' + esc(u.name) + '</p>' +
      '<div class="tp-item-meta">' +
        '<span class="uebung-kat-badge uebung-kat-' + esc(u.kategorie) + '">' + esc(UEBUNG_KAT_LABEL[u.kategorie] || u.kategorie) + '</span>' +
        '<span>👥 ' + esc(u.spieler_min) + (u.spieler_min === u.spieler_max ? '' : '–' + esc(u.spieler_max)) + '</span>' +

      (it.notiz ? '<p class="tp-item-notiz">' + esc(it.notiz) + '</p>' : '') +
    '</div>' +
    '<span class="tp-item-dauer' + dauerCls + '">' + dauer + ' min</span>' +
    '<div class="tp-item-actions">' +
      '<button class="icon-btn" data-item-action="up" data-p-idx="' + pIdx + '" data-i-idx="' + iIdx + '" title="Nach oben"' + (iIdx === 0 ? ' disabled style="opacity:0.3;"' : '') + '>↑</button>' +
      '<button class="icon-btn" data-item-action="down" data-p-idx="' + pIdx + '" data-i-idx="' + iIdx + '" title="Nach unten"' + (iIdx === total - 1 ? ' disabled style="opacity:0.3;"' : '') + '>↓</button>' +
      '<button class="icon-btn" data-item-action="del" data-p-idx="' + pIdx + '" data-i-idx="' + iIdx + '" title="Entfernen">×</button>' +
    '</div>' +
  '</div>';
}

function openPickerModal(title, callback) {
  pickerCallback = callback;
  pickerSearch = '';
  pickerKatFilter = 'alle';
  document.getElementById('picker-modal-title').textContent = title || 'Übung auswählen';
  renderPickerBody();
  document.getElementById('picker-modal').classList.add('open');
  setTimeout(() => { const el = document.getElementById('picker-search'); if (el) el.focus(); }, 50);
}

function renderPickerBody() {
  const all = (db.uebungen || []).slice();
  const q = pickerSearch.toLowerCase().trim();
  let filtered = pickerKatFilter === 'alle' ? all : all.filter(u => u.kategorie === pickerKatFilter);
  if (q) {
    filtered = filtered.filter(u => (u.name + ' ' + (u.beschreibung || '')).toLowerCase().includes(q));
  }
  filtered.sort((a, b) => a.name.localeCompare(b.name, 'de'));

  const katCounts = { alle: all.length };
  UEBUNG_KATEGORIEN.forEach(k => { katCounts[k] = all.filter(u => u.kategorie === k).length; });

  const listHtml = filtered.length === 0
    ? '<div class="picker-empty">Keine Übungen gefunden.</div>'
    : filtered.map(u => {
        const icon = UEBUNG_KAT_ICON[u.kategorie] || '⚽';
        return '<div class="picker-row" data-uebung-id="' + esc(u.id) + '">' +
          '<span class="picker-row-icon">' + icon + '</span>' +
          '<div class="picker-row-body">' +
            '<p class="picker-row-name">' + esc(u.name) + '</p>' +
            '<div class="picker-row-meta">' +
              '<span class="uebung-kat-badge uebung-kat-' + esc(u.kategorie) + '">' + esc(UEBUNG_KAT_LABEL[u.kategorie] || u.kategorie) + '</span>' +
              '<span>⏱ ' + esc(u.dauer_min) + ' min</span>' +
              '<span>👥 ' + esc(u.spieler_min) + (u.spieler_min === u.spieler_max ? '' : '–' + esc(u.spieler_max)) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

  const body = document.getElementById('picker-modal-body');
  body.innerHTML =
    '<div class="picker-toolbar">' +
      '<input type="search" id="picker-search" class="picker-search" placeholder="Übungen durchsuchen …" value="' + esc(pickerSearch) + '">' +
    '</div>' +
    '<div class="filter-pills" style="margin-bottom: 12px;">' +
      '<button class="filter-pill ' + (pickerKatFilter === 'alle' ? 'active' : '') + '" data-pickerkat="alle">Alle (' + katCounts.alle + ')</button>' +
      UEBUNG_KATEGORIEN.map(k =>
        '<button class="filter-pill ' + (pickerKatFilter === k ? 'active' : '') + '" data-pickerkat="' + k + '">' + UEBUNG_KAT_LABEL[k] + ' (' + katCounts[k] + ')</button>'
      ).join('') +
    '</div>' +
    '<div class="picker-list">' + listHtml + '</div>';

  const searchEl = document.getElementById('picker-search');
  searchEl.oninput = () => { pickerSearch = searchEl.value; renderPickerBody(); setTimeout(() => document.getElementById('picker-search').focus(), 0); };

  body.querySelectorAll('[data-pickerkat]').forEach(btn => {
    btn.onclick = () => { pickerKatFilter = btn.dataset.pickerkat; renderPickerBody(); };
  });

  body.querySelectorAll('[data-uebung-id]').forEach(row => {
    row.onclick = () => {
      const u = db.uebungen.find(x => x.id === row.dataset.uebungId);
      if (u && pickerCallback) pickerCallback(u);
      closePickerModal();
    };
  });
}

function closePickerModal() {
  document.getElementById('picker-modal').classList.remove('open');
  pickerCallback = null;
}

function closeItemModal() {
  document.getElementById('item-modal').classList.remove('open');
  itemEditCtx = null;
}

function saveItemModal() {
  if (appMode === 'kids') { closeItemModal(); return; }
  if (!itemEditCtx) return;
  const tp = db.trainingsplaene.find(x => x.id === itemEditCtx.tpId);
  if (!tp) return;

  const tp = db.trainingsplaene.find(x => x.id === itemEditCtx.tpId);
  if (!tp) return;
  tp.phasen[itemEditCtx.pIdx].items.splice(itemEditCtx.iIdx, 1);

  renderTrainingsplaeneTab();
  closeItemModal();
}

function getActiveSpielzuege() {

}

  const cardsHtml = visible.length === 0
    ? emptyHtml
    : '<div class="sz-list-grid">' + visible.map(sz => {
        const counts = countElements(sz);
        return '<div class="sz-list-card" data-sz-id="' + esc(sz.id) + '">' +
          '<div class="sz-list-thumb">' + renderPitchThumb(sz) + '</div>' +
          '<div class="sz-list-body">' +
            '<p class="sz-list-name">' + esc(sz.name) + '</p>' +
            '<div class="sz-list-meta">' +
              '<span class="sz-kat-badge sz-kat-' + esc(sz.kategorie) + '">' + esc(SZ_KAT_LABEL[sz.kategorie] || sz.kategorie) + '</span>' +
              '<span style="font-size: 11px; color: var(--text-2);">' + counts.spieler + 'S · ' + counts.gegner + 'G · ' + counts.pfeil + ' Pfeile</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('') + '</div>';

  container.innerHTML =
    '<div class="toolbar">' +
      '<div style="font-size: 13px; color: var(--text-2);">' + all.length + ' Spielzug' + (all.length === 1 ? '' : 'üge'.slice(1)) + '</div>' +
      '<div style="flex:1;"></div>' +
      toolbarLoadBtn +
      '<button class="btn btn-primary" id="sz-add">+ Spielzug hinzufügen</button>' +
    '</div>' +
    '<div class="filter-pills" style="margin-bottom: 14px;">' +
      '<button class="filter-pill ' + (!szListKatFilter || szListKatFilter === 'alle' ? 'active' : '') + '" data-szkat="alle">Alle (' + katCounts.alle + ')</button>' +
      SZ_KATEGORIEN.map(k =>
        '<button class="filter-pill ' + (szListKatFilter === k ? 'active' : '') + '" data-szkat="' + k + '">' + SZ_KAT_LABEL[k] + ' (' + katCounts[k] + ')</button>'
      ).join('') +
    '</div>' +
    cardsHtml;

  document.getElementById('sz-add').onclick = () => {
    const fresh = mkSpielzug(db.meta.active_mannschaft_id, {});
    db.spielzuege.push(fresh);
    saveDb();
    openSpielzugEditor(fresh.id);
  };
  const loadSeedsFn = () => {
    const seeds = getSeedSpielzuege(db.meta.active_mannschaft_id);
    const existing = new Set((db.spielzuege || []).filter(s => s.mannschaft_id === db.meta.active_mannschaft_id).map(s => s.name.toLowerCase()));
    const toAdd = seeds.filter(s => !existing.has(s.name.toLowerCase()));
    if (toAdd.length === 0) {
      alert('Alle Beispiele sind bereits geladen.');
      return;
    }
    db.spielzuege = (db.spielzuege || []).concat(toAdd);
    saveDb();
    renderSpielzuegeTab();
  };
  const loadBtn = document.getElementById('sz-load-examples');
  if (loadBtn) loadBtn.onclick = loadSeedsFn;
  const loadBtnTb = document.getElementById('sz-load-examples-toolbar');
  if (loadBtnTb) loadBtnTb.onclick = loadSeedsFn;
  container.querySelectorAll('[data-szkat]').forEach(btn => {
    btn.onclick = () => { szListKatFilter = btn.dataset.szkat; renderSpielzuegeTab(); };
  });
  container.querySelectorAll('[data-sz-id]').forEach(card => {
    card.onclick = () => openSpielzugEditor(card.dataset.szId);
  });
}

function countElements(sz) {
  const c = { spieler: 0, gegner: 0, ball: 0, pfeil: 0 };
  (sz.elemente || []).forEach(e => { if (c[e.type] != null) c[e.type]++; });
  return c;
}

function openSpielzugEditor(id) {
  editingSpielzugId = id;
  spielzuegeView = 'edit';
  szTool = 'select';
  szSelectedElId = null;
  szPfeilStart = null;
  const sz = (db.spielzuege || []).find(x => x.id === id);
  szCurrentPhase = sz ? Math.max(1, getMaxPhase(sz)) : 1;
  renderSpielzuegeTab();
}

function closeSpielzugEditor() {
  if (szAnimRunning) stopSzAnimation();
  spielzuegeView = 'list';
  editingSpielzugId = null;
  szTool = 'select';
  szSelectedElId = null;
  szPfeilStart = null;
  renderSpielzuegeTab();
}

function renderSpielzugViewer(sz) {
  const counts = countElements(sz);
  const canPlay = counts.pfeil > 0;

  let instruction = 'Drücke „Abspielen", um den Spielzug zu sehen';
  let instructionActive = false;
  if (szAnimRunning) { instruction = '▶ Animation läuft — Klick auf das Feld zum Stoppen'; instructionActive = true; }

  const playBtnHtml = szAnimRunning
    ? '<button class="sz-viewer-play stop" id="sz-stop">■ Stoppen</button>'
    : '<button class="sz-viewer-play" id="sz-play"' + (canPlay ? '' : ' disabled') + '>▶ Abspielen</button>';

  const container = document.getElementById('tab-spielzuege');
  container.innerHTML =
    '<div class="sz-viewer-top">' +
      '<button class="aufst-back-btn" id="sz-back">← Zurück</button>' +
      '<h2 class="sz-viewer-name">' + esc(sz.name) + '</h2>' +
      '<span class="sz-kat-badge sz-kat-' + esc(sz.kategorie) + '">' + esc(SZ_KAT_LABEL[sz.kategorie] || sz.kategorie) + '</span>' +
      playBtnHtml +
    '</div>' +
    '<div class="sz-viewer-layout">' +
      '<div class="sz-viewer-pitch-wrap">' +
        '<div class="sz-viewer-instruction ' + (instructionActive ? 'active' : '') + '">' + instruction + '</div>' +
        '<div class="sz-viewer-pitch">' + renderSpielzugPitch(sz) + '</div>' +
      '</div>' +
      (sz.beschreibung
        ? '<div class="sz-viewer-description"><h3>Beschreibung</h3>' + esc(sz.beschreibung) + '</div>'
        : '') +
    '</div>';

  document.getElementById('sz-back').onclick = closeSpielzugEditor;
  const playBtn = document.getElementById('sz-play');
  if (playBtn) playBtn.onclick = () => startSzAnimation(sz);
  const stopBtn = document.getElementById('sz-stop');
  if (stopBtn) stopBtn.onclick = () => stopSzAnimation();

  const svg = document.getElementById('sz-pitch');
  if (svg) {
    svg.addEventListener('mousedown', () => {
      if (szAnimRunning) stopSzAnimation();
    });
  }
}

function renderSpielzugEditor() {
  const sz = (db.spielzuege || []).find(x => x.id === editingSpielzugId);
  if (!sz) { closeSpielzugEditor(); return; }
  if (appMode === 'kids') { renderSpielzugViewer(sz); return; }
  const counts = countElements(sz);

  const tools = [
    { id: 'select', icon: '↖', title: 'Auswahl (V)' },
    { divider: true },
    { id: 'spieler', icon: '🔵', title: 'Eigener Spieler' },
    { id: 'gegner', icon: '🔴', title: 'Gegner' },
    { id: 'ball', icon: '⚽', title: 'Ball', disabled: counts.ball > 0 },
    { divider: true },
    { id: 'lauf', icon: '→', title: 'Lauf-Pfeil' },
    { id: 'pass', icon: '⇢', title: 'Pass-Pfeil' },
    { id: 'dribbel', icon: '〰', title: 'Dribbel-Pfeil' },
    { divider: true },
    { id: 'zone', icon: '⬢', title: 'Zone zeichnen' }
  ];

  const toolbarHtml = tools.map(t => {
    if (t.divider) return '<div class="sz-tool-divider"></div>';
    return '<button class="sz-tool ' + (szTool === t.id ? 'active' : '') + '" data-sz-tool="' + t.id + '" title="' + esc(t.title) + '"' + (t.disabled ? ' disabled' : '') + '>' + t.icon + '</button>';
  }).join('');

  let instruction = 'Auswahl: Element klicken zum Selektieren · Drag zum Verschieben · Entf-Taste zum Löschen';
  let instructionActive = false;
  let instructionDanger = false;
  let deleteBtnHtml = '';
  if (szAnimRunning) {
    instruction = '▶ Animation läuft — Klick auf das Feld zum Stoppen';
    instructionActive = true;
  } else if (szTool === 'zone') {
    const pts = szZoneDrawing ? szZoneDrawing.points.length : 0;
    const colorBtns = ZONE_COLORS.map(c =>
      '<button type="button" class="sz-zone-color-btn sz-zone-color-' + c + (szZoneColor === c ? ' active' : '') + '" data-zone-color="' + c + '" title="' + ZONE_COLOR_LABEL[c] + '"></button>'
    ).join('');
    instruction = 'Zone zeichnen — Klicks setzen Polygon-Ecken' +
      ' <span class="sz-zone-controls">' + colorBtns +
      ' <span style="opacity:0.85;">Punkte: <strong>' + pts + '</strong></span>' +
      ' <button type="button" class="sz-zone-action-btn confirm" id="sz-zone-finish"' + (pts < 3 ? ' disabled' : '') + '>Fertig</button>' +
      (pts > 0 ? ' <button type="button" class="sz-zone-action-btn" id="sz-zone-cancel">Verwerfen</button>' : '') +
      '</span>';
    instructionActive = true;
  } else if (szTool === 'select' && szSelectedElId) {
    const selEl = (sz.elemente || []).find(x => x.id === szSelectedElId);
    if (selEl) {
      const typLabel = selEl.type === 'spieler' ? 'Spieler' + (selEl.nummer != null ? ' ' + selEl.nummer : '')
        : selEl.type === 'gegner' ? 'Gegner'
        : selEl.type === 'ball' ? 'Ball'
        : selEl.type === 'pfeil' ? (PFEIL_LABEL[selEl.subtyp] || 'Pfeil') + '-Pfeil'
        : selEl.type === 'zone' ? 'Zone (' + (ZONE_COLOR_LABEL[selEl.color] || selEl.color) + ')'
        : 'Element';
      instruction = typLabel + ' ausgewählt';
      if (selEl.type === 'pfeil') {
        const allPf = (sz.elemente || []).filter(e => e.type === 'pfeil');
        const ph = getPfeilPhase(selEl, allPf);
        instruction += ' <span class="sz-phase-controls">Phase <button data-phase-shift="-1"' + (ph <= 1 ? ' disabled' : '') + '>−</button> <strong>' + ph + '</strong> <button data-phase-shift="1">+</button></span>';
      } else if (selEl.type === 'zone') {
        instruction += '<input type="text" class="sz-zone-label-input" id="sz-zone-label-edit" placeholder="Label …" value="' + esc(selEl.label || '') + '">';
      }
      instructionDanger = true;
      deleteBtnHtml = '<button class="sz-instruction-del" id="sz-del-selected" title="Element entfernen">× Löschen</button>';
    }
  } else if (szTool === 'spieler') { instruction = 'Klicke auf das Feld, um einen eigenen Spieler zu setzen'; instructionActive = true; }
  else if (szTool === 'gegner') { instruction = 'Klicke auf das Feld, um einen Gegner zu setzen'; instructionActive = true; }
  else if (szTool === 'ball') { instruction = 'Klicke auf das Feld, um den Ball zu platzieren'; instructionActive = true; }
  else if (PFEIL_TYPEN.indexOf(szTool) >= 0) {
    if (szPfeilStart) instruction = PFEIL_LABEL[szTool] + '-Pfeil (Phase ' + szCurrentPhase + '): jetzt Endpunkt klicken';
    else instruction = PFEIL_LABEL[szTool] + '-Pfeil (Phase ' + szCurrentPhase + '): Startpunkt klicken';
    instructionActive = true;
  }

  const canPlay = counts.pfeil > 0;
  const playBtnHtml = szAnimRunning
    ? '<button class="sz-play-btn stop" id="sz-stop">■ Stoppen</button>'
    : '<button class="sz-play-btn" id="sz-play"' + (canPlay ? '' : ' disabled title="Mindestens ein Pfeil nötig"') + '>▶ Abspielen</button>';

  const phaseIndicatorHtml = szAnimRunning ? '' :
    '<span class="sz-current-phase" title="Neu gezeichnete Pfeile landen in dieser Phase">Phase: <strong>' + szCurrentPhase + '</strong></span>' +
    '<button class="sz-newphase-btn" id="sz-newphase" title="Nachfolgende Pfeile in neue Phase legen">+ Neue Phase</button>';

  const container = document.getElementById('tab-spielzuege');
  container.innerHTML =
    '<div class="sz-editor-top">' +
      '<button class="aufst-back-btn" id="sz-back">← Spielzüge</button>' +
      '<input type="text" id="sz-name" value="' + esc(sz.name) + '" placeholder="Name">' +
      '<select id="sz-kategorie" title="Kategorie"' + (szAnimRunning ? ' disabled' : '') + '>' +
        SZ_KATEGORIEN.map(k => '<option value="' + k + '" ' + (sz.kategorie === k ? 'selected' : '') + '>' + SZ_KAT_LABEL[k] + '</option>').join('') +
      '</select>' +
      phaseIndicatorHtml +
      playBtnHtml +
      '<div class="aufst-spacer"></div>' +
      '<button class="btn btn-danger" id="sz-delete"' + (szAnimRunning ? ' disabled' : '') + '>Löschen</button>' +
    '</div>' +
    '<div class="sz-layout">' +
      '<div class="sz-toolbar' + (szAnimRunning ? ' dim' : '') + '">' + toolbarHtml + '</div>' +
      '<div class="sz-pitch-wrap">' +
        '<div class="sz-instruction ' + (instructionActive ? 'active' : '') + (instructionDanger ? ' danger' : '') + '"><span>' + instruction + '</span>' + deleteBtnHtml + '</div>' +
        renderSpielzugPitch(sz) +
      '</div>' +
      '<div class="sz-sidebar">' +
        '<div class="sz-sidebar-block">' +
          '<p class="sz-sidebar-h">Beschreibung</p>' +
          '<textarea id="sz-beschreibung" placeholder="Ablauf, Schlüsselmoment, Variation …"' + (szAnimRunning ? ' disabled' : '') + '>' + esc(sz.beschreibung || '') + '</textarea>' +
        '</div>' +
        '<div class="sz-counts">' +
          '<span>🔵 ' + counts.spieler + '</span>' +
          '<span>🔴 ' + counts.gegner + '</span>' +
          '<span>⚽ ' + counts.ball + '</span>' +
          '<span>↗ ' + counts.pfeil + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('sz-back').onclick = closeSpielzugEditor;
  document.getElementById('sz-delete').onclick = () => {
    if (!confirm('Spielzug "' + sz.name + '" wirklich löschen?')) return;
    db.spielzuege = db.spielzuege.filter(x => x.id !== sz.id);
    saveDb();
    closeSpielzugEditor();
  };

  const nameEl = document.getElementById('sz-name');
  nameEl.onblur = () => {
    const v = nameEl.value.trim() || 'Unbenannt';
    if (v !== sz.name) { sz.name = v; saveDb(); }
  };
  document.getElementById('sz-kategorie').onchange = (e) => {
    sz.kategorie = e.target.value; saveDb();
  };
  document.getElementById('sz-beschreibung').onblur = (e) => {
    const v = e.target.value.trim();
    if (v !== sz.beschreibung) { sz.beschreibung = v; saveDb(); }
  };

  container.querySelectorAll('[data-sz-tool]').forEach(btn => {
    btn.onclick = () => {
      const t = btn.dataset.szTool;
      szTool = t;
      szPfeilStart = null;
      szSelectedElId = null;
      if (t !== 'zone') szZoneDrawing = null;
      renderSpielzuegeTab();
    };
  });

  const delBtn = document.getElementById('sz-del-selected');
  if (delBtn) {
    delBtn.onclick = () => {
      if (!szSelectedElId) return;
      sz.elemente = sz.elemente.filter(x => x.id !== szSelectedElId);
      szSelectedElId = null;
      saveDb();
      renderSpielzuegeTab();
    };
  }

  const playBtn = document.getElementById('sz-play');
  if (playBtn) playBtn.onclick = () => startSzAnimation(sz);
  const stopBtn = document.getElementById('sz-stop');
  if (stopBtn) stopBtn.onclick = () => stopSzAnimation();

  const newPhaseBtn = document.getElementById('sz-newphase');
  if (newPhaseBtn) newPhaseBtn.onclick = () => {
    szCurrentPhase = szCurrentPhase + 1;
    renderSpielzuegeTab();
  };

  container.querySelectorAll('[data-phase-shift]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      if (!szSelectedElId) return;
      const selEl = sz.elemente.find(x => x.id === szSelectedElId);
      if (!selEl || selEl.type !== 'pfeil') return;
      const allPf = sz.elemente.filter(e => e.type === 'pfeil');
      const current = getPfeilPhase(selEl, allPf);
      const shift = parseInt(btn.dataset.phaseShift, 10);
      const next = Math.max(1, current + shift);
      selEl.phase = next;
      saveDb();
      renderSpielzuegeTab();
    };
  });

  container.querySelectorAll('[data-zone-color]').forEach(btn => {
    btn.onclick = () => {
      szZoneColor = btn.dataset.zoneColor;
      if (szZoneDrawing) szZoneDrawing.color = szZoneColor;
      renderSpielzuegeTab();
    };
  });

  const zoneFinishBtn = document.getElementById('sz-zone-finish');
  if (zoneFinishBtn) zoneFinishBtn.onclick = () => {
    if (!szZoneDrawing || szZoneDrawing.points.length < 3) return;
    const label = prompt('Label für die Zone (z.B. "Raumdeckung", "Pressing-Zone"):', '') || '';
    sz.elemente.push(mkSzEl('zone', { points: szZoneDrawing.points.slice(), color: szZoneDrawing.color, label: label.trim() }));
    szZoneDrawing = null;
    saveDb();
    renderSpielzuegeTab();
  };
  const zoneCancelBtn = document.getElementById('sz-zone-cancel');
  if (zoneCancelBtn) zoneCancelBtn.onclick = () => {
    szZoneDrawing = null;
    renderSpielzuegeTab();
  };

  const zoneLabelInput = document.getElementById('sz-zone-label-edit');
  if (zoneLabelInput) {
    zoneLabelInput.onblur = () => {
      if (!szSelectedElId) return;
      const selEl = sz.elemente.find(x => x.id === szSelectedElId);
      if (!selEl || selEl.type !== 'zone') return;
      const v = zoneLabelInput.value.trim();
      if (v !== (selEl.label || '')) { selEl.label = v; saveDb(); renderSpielzuegeTab(); }
    };
    zoneLabelInput.onkeydown = (e) => { if (e.key === 'Enter') zoneLabelInput.blur(); };
  }

  attachPitchHandlers(sz);
}

function renderPitchThumb(sz) {
  const allElements = sz.elemente || [];
  const ctx = { allElements: allElements };
  const zones = allElements.filter(e => e.type === 'zone');
  const rest = allElements.filter(e => e.type !== 'zone');
  return '<svg viewBox="0 0 100 150" preserveAspectRatio="xMidYMid meet">' +
    pitchBackgroundMarkup() +
    zones.map(e => renderElMarkup(e, false, ctx)).join('') +
    rest.map(e => renderElMarkup(e, false, ctx)).join('') +
    '<defs>' +
      '<marker id="arr-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="white"/></marker>' +
      '<marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b5e"/></marker>' +
    '</defs>' +
  '</svg>';
}

function renderSpielzugPitch(sz) {
  const allElements = sz.elemente || [];
  const allPfeile = allElements.filter(e => e.type === 'pfeil');
  const ctx = { showPhases: true, allPfeile: allPfeile, allElements: allElements };
  const zones = allElements.filter(e => e.type === 'zone');
  const rest = allElements.filter(e => e.type !== 'zone');

  let drawingMarkup = '';
  if (szTool === 'zone' && szZoneDrawing && szZoneDrawing.points.length > 0) {
    const fill = ZONE_COLOR_FILL[szZoneDrawing.color] || ZONE_COLOR_FILL.green;
    const stroke = ZONE_COLOR_STROKE[szZoneDrawing.color] || ZONE_COLOR_STROKE.green;
    const pts = szZoneDrawing.points;
    const ptsStr = pts.map(p => p.x + ',' + p.y).join(' ');
    const polygon = pts.length >= 3
      ? '<polygon points="' + ptsStr + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="0.4" stroke-dasharray="1.2 0.8" stroke-linejoin="round"/>'
      : (pts.length === 2 ? '<line class="sz-zone-drawing-line" x1="' + pts[0].x + '" y1="' + pts[0].y + '" x2="' + pts[1].x + '" y2="' + pts[1].y + '"/>' : '');
    const dots = pts.map(p => '<circle class="sz-zone-drawing-point" cx="' + p.x + '" cy="' + p.y + '" r="1.2"/>').join('');
    drawingMarkup = polygon + dots;
  }

  const pitchToolCls = szTool === 'zone' ? 'tool-place'
    : (PFEIL_TYPEN.indexOf(szTool) >= 0 ? 'tool-pfeil'
    : (szTool === 'select' ? 'tool-select' : 'tool-place'));

  return '<svg viewBox="0 0 100 150" class="sz-pitch ' + pitchToolCls + '" id="sz-pitch" preserveAspectRatio="xMidYMid meet">' +
    pitchBackgroundMarkup() +
    zones.map(el => renderElMarkup(el, el.id === szSelectedElId, ctx)).join('') +
    drawingMarkup +
    rest.map(el => renderElMarkup(el, el.id === szSelectedElId, ctx)).join('') +
    (szPfeilStart ? '<circle cx="' + szPfeilStart.x + '" cy="' + szPfeilStart.y + '" r="1.5" fill="var(--accent)" stroke="white" stroke-width="0.3"/>' : '') +
    '<defs>' +
      '<marker id="arr-w" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="white"/></marker>' +
      '<marker id="arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b5e"/></marker>' +
      '<marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/></marker>' +
    '</defs>' +
  '</svg>';
}

function pitchBackgroundMarkup() {
  return '<defs>' +
    '<linearGradient id="sz-grad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="#5e8c1f"/>' +
      '<stop offset="1" stop-color="#4a7117"/>' +
    '</linearGradient>' +
  '</defs>' +
  '<rect width="100" height="150" fill="url(#sz-grad)"/>' +
  '<g stroke="white" stroke-width="0.35" fill="none" opacity="0.55" stroke-linejoin="round">' +
    '<rect x="1" y="1" width="98" height="148" />' +
    '<line x1="1" y1="75" x2="99" y2="75" />' +
    '<circle cx="50" cy="75" r="10" />' +
    '<circle cx="50" cy="75" r="0.6" fill="white" stroke="none"/>' +
    '<rect x="22" y="1" width="56" height="20" />' +
    '<rect x="36" y="1" width="28" height="7" />' +
    '<path d="M 38 21 A 12 12 0 0 0 62 21" />' +
    '<rect x="22" y="129" width="56" height="20" />' +
    '<rect x="36" y="142" width="28" height="7" />' +
    '<path d="M 38 129 A 12 12 0 0 1 62 129" />' +
  '</g>';
}

function renderElMarkup(el, selected, ctx) {
  const sel = selected ? ' selected' : '';
  if (el.type === 'zone') {
    const points = (el.points || []).map(p => p.x + ',' + p.y).join(' ');
    const fill = ZONE_COLOR_FILL[el.color] || ZONE_COLOR_FILL.green;
    const stroke = ZONE_COLOR_STROKE[el.color] || ZONE_COLOR_STROKE.green;
    let labelMarkup = '';
    if (el.label) {
      let cx = 0, cy = 0;
      (el.points || []).forEach(p => { cx += p.x; cy += p.y; });
      const n = Math.max(1, (el.points || []).length);
      cx /= n; cy /= n;
      labelMarkup = '<text class="sz-zone-label" x="' + cx + '" y="' + cy + '">' + esc(el.label) + '</text>';
    }
    return '<g class="sz-zone' + sel + '" data-el-id="' + esc(el.id) + '">' +
      '<polygon points="' + points + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="0.4" stroke-linejoin="round"/>' +
      labelMarkup +
    '</g>';
  }
  if (el.type === 'spieler' || el.type === 'gegner') {
    const cls = el.type === 'spieler' ? 'sz-el-spieler' : 'sz-el-gegner';
    const label = el.type === 'spieler' ? (el.nummer != null ? esc(el.nummer) : '') : '×';
    const labelCls = el.type === 'spieler' ? 'sz-el-num' : 'sz-el-x';
    return '<g class="sz-el' + sel + '" data-el-id="' + esc(el.id) + '" transform="translate(' + el.x + ',' + el.y + ')">' +
      (selected ? '<circle class="sz-el-halo" r="4.6"/>' : '') +
      '<circle class="sz-el-bg ' + cls + '" r="3.2"/>' +
      '<text class="' + labelCls + '">' + label + '</text>' +
    '</g>';
  }
  if (el.type === 'ball') {
    return '<g class="sz-el' + sel + '" data-el-id="' + esc(el.id) + '" transform="translate(' + el.x + ',' + el.y + ')">' +
      (selected ? '<circle class="sz-el-halo" r="3.2"/>' : '') +
      '<circle class="sz-el-bg sz-el-ball" r="1.8"/>' +
    '</g>';
  }
  if (el.type === 'pfeil') {
    const cls = 'sz-pfeil-' + (el.subtyp || 'lauf');
    let isFoe = false;
    if (ctx && ctx.allElements) {
      let closest = null, closestDist = 6;
      ctx.allElements.forEach(e => {
        if (e.type !== 'spieler' && e.type !== 'gegner') return;
        const dx = e.x - el.x1, dy = e.y - el.y1;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < closestDist) { closest = e; closestDist = d; }
      });
      if (closest && closest.type === 'gegner') isFoe = true;
    }
    const marker = isFoe ? 'arr-r' : 'arr-w';
    let pathMarkup;
    if (el.subtyp === 'dribbel') {
      pathMarkup = '<path d="' + wavyPath(el.x1, el.y1, el.x2, el.y2) + '" class="' + cls + '" marker-end="url(#' + marker + ')"/>';
    } else {
      pathMarkup = '<line x1="' + el.x1 + '" y1="' + el.y1 + '" x2="' + el.x2 + '" y2="' + el.y2 + '" class="' + cls + '" marker-end="url(#' + marker + ')"/>';
    }
    const hitPath = el.subtyp === 'dribbel'
      ? '<path d="' + wavyPath(el.x1, el.y1, el.x2, el.y2) + '" class="sz-pfeil-hit"/>'
      : '<line x1="' + el.x1 + '" y1="' + el.y1 + '" x2="' + el.x2 + '" y2="' + el.y2 + '" class="sz-pfeil-hit"/>';
    const showPhase = ctx && ctx.showPhases;
    const phase = ctx && ctx.allPfeile ? getPfeilPhase(el, ctx.allPfeile) : null;
    const midX = (el.x1 + el.x2) / 2;
    const midY = (el.y1 + el.y2) / 2;
    const phaseBadge = (showPhase && phase != null)
      ? '<g class="sz-phase-badge" transform="translate(' + midX + ',' + midY + ')"><circle r="2.4"/><text>' + phase + '</text></g>'
      : '';
    const phaseAttr = phase != null ? ' data-phase="' + phase + '"' : '';
    return '<g class="sz-pfeil' + sel + (isFoe ? ' foe' : '') + '" data-el-id="' + esc(el.id) + '"' + phaseAttr + '>' +
      pathMarkup + hitPath + phaseBadge +
    '</g>';
  }
  return '';
}

function wavyPath(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 0.5) return 'M ' + x1 + ' ' + y1 + ' L ' + x2 + ' ' + y2;
  const nx = -dy / len, ny = dx / len;
  const waves = Math.max(2, Math.round(len / 4));
  const amp = 1.2;
  let path = 'M ' + x1 + ' ' + y1;
  for (let i = 1; i <= waves; i++) {
    const t1 = (i - 0.5) / waves;
    const t2 = i / waves;
    const sign = (i % 2 === 1) ? 1 : -1;
    const cx = x1 + dx * t1 + nx * amp * sign;
    const cy = y1 + dy * t1 + ny * amp * sign;
    const ex = x1 + dx * t2;
    const ey = y1 + dy * t2;
    path += ' Q ' + cx + ' ' + cy + ' ' + ex + ' ' + ey;
  }
  return path;
}

function getSzPoint(svg, evt) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const ctm = svg.getScreenCTM();
  if (!ctm) return { x: 50, y: 75 };
  const tr = pt.matrixTransform(ctm.inverse());
  return { x: Math.max(2, Math.min(98, tr.x)), y: Math.max(2, Math.min(148, tr.y)) };
}

function attachPitchHandlers(sz) {
  const svg = document.getElementById('sz-pitch');
  if (!svg) return;

  svg.addEventListener('mousedown', (e) => {
    if (szAnimRunning) { stopSzAnimation(); return; }
    if (document.activeElement && document.activeElement.blur && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) {
      document.activeElement.blur();
    }
    const elTarget = e.target.closest('[data-el-id]');
    const elId = elTarget ? elTarget.dataset.elId : null;
    const pt = getSzPoint(svg, e);

    if (szTool === 'select') {
      if (elId) {
        szSelectedElId = elId;
        const el = sz.elemente.find(x => x.id === elId);
        if (el && (el.type === 'spieler' || el.type === 'gegner' || el.type === 'ball')) {
          szDragging = { elId: elId, offsetX: el.x - pt.x, offsetY: el.y - pt.y, moved: false };
        }
        renderSpielzuegeTab();
      } else {
        if (szSelectedElId) { szSelectedElId = null; renderSpielzuegeTab(); }
      }
      return;
    }

    if (szTool === 'spieler' || szTool === 'gegner') {
      const nummer = szTool === 'spieler' ? (countElements(sz).spieler + 1) : null;
      sz.elemente.push(mkSzEl(szTool, { x: pt.x, y: pt.y, nummer: nummer }));
      saveDb();
      renderSpielzuegeTab();
      return;
    }
    if (szTool === 'ball') {
      if (countElements(sz).ball > 0) return;
      sz.elemente.push(mkSzEl('ball', { x: pt.x, y: pt.y }));
      saveDb();
      renderSpielzuegeTab();
      return;
    }
    if (PFEIL_TYPEN.indexOf(szTool) >= 0) {
      if (!szPfeilStart) {
        szPfeilStart = { x: pt.x, y: pt.y };
        renderSpielzuegeTab();
      } else {
        sz.elemente.push(mkSzEl('pfeil', { subtyp: szTool, x1: szPfeilStart.x, y1: szPfeilStart.y, x2: pt.x, y2: pt.y, phase: szCurrentPhase }));
        szPfeilStart = null;
        saveDb();
        renderSpielzuegeTab();
      }
      return;
    }
    if (szTool === 'zone') {
      if (!szZoneDrawing) szZoneDrawing = { color: szZoneColor, points: [] };
      szZoneDrawing.points.push({ x: pt.x, y: pt.y });
      renderSpielzuegeTab();
      return;
    }
  });

  svg.addEventListener('mousemove', (e) => {
    if (!szDragging) return;
    const el = sz.elemente.find(x => x.id === szDragging.elId);
    if (!el) return;
    const pt = getSzPoint(svg, e);
    el.x = Math.max(2, Math.min(98, pt.x + szDragging.offsetX));
    el.y = Math.max(2, Math.min(148, pt.y + szDragging.offsetY));
    szDragging.moved = true;
    const g = svg.querySelector('[data-el-id="' + el.id + '"]');
    if (g) g.setAttribute('transform', 'translate(' + el.x + ',' + el.y + ')');
  });

  const endDrag = () => {
    if (szDragging) {
      if (szDragging.moved) saveDb();
      szDragging = null;
    }
  };
  svg.addEventListener('mouseup', endDrag);
  svg.addEventListener('mouseleave', endDrag);
}

function buildAnimSteps(sz) {
  const elements = sz.elemente || [];
  const allPfeile = elements.filter(e => e.type === 'pfeil');
  if (allPfeile.length === 0) return [];

  const sim = {};
  elements.forEach(e => { if (e.x != null) sim[e.id] = { x: e.x, y: e.y }; });

  const ball = elements.find(e => e.type === 'ball');

  const phaseGroups = {};
  allPfeile.forEach(p => {
    const ph = getPfeilPhase(p, allPfeile);
    if (!phaseGroups[ph]) phaseGroups[ph] = [];
    phaseGroups[ph].push(p);
  });
  const phaseNumbers = Object.keys(phaseGroups).map(n => parseInt(n, 10)).sort((a, b) => a - b);

  const steps = [];
  phaseNumbers.forEach(phaseNum => {
    const pfeileInPhase = phaseGroups[phaseNum];
    const moves = [];
    const claimed = {};

    pfeileInPhase.forEach(p => {
      if (p.subtyp === 'pass') {
        if (ball && sim[ball.id] && !claimed[ball.id]) {
          moves.push({ elId: ball.id, from: { x: sim[ball.id].x, y: sim[ball.id].y }, to: { x: p.x2, y: p.y2 } });
          claimed[ball.id] = true;
        }
      } else {
        let closest = null, closestDist = 6;
        elements.forEach(e => {
          if (e.type !== 'spieler' && e.type !== 'gegner') return;
          if (claimed[e.id]) return;
          const pos = sim[e.id]; if (!pos) return;
          const dx = pos.x - p.x1, dy = pos.y - p.y1;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < closestDist) { closest = e; closestDist = d; }
        });
        if (closest) {
          moves.push({ elId: closest.id, from: { x: sim[closest.id].x, y: sim[closest.id].y }, to: { x: p.x2, y: p.y2 } });
          claimed[closest.id] = true;
        }
        if (p.subtyp === 'dribbel' && ball && sim[ball.id] && !claimed[ball.id]) {
          moves.push({ elId: ball.id, from: { x: sim[ball.id].x, y: sim[ball.id].y }, to: { x: p.x2, y: p.y2 } });
          claimed[ball.id] = true;
        }
      }
    });

    moves.forEach(m => { sim[m.elId] = { x: m.to.x, y: m.to.y }; });
    if (moves.length) steps.push({ moves: moves, phase: phaseNum });
  });

  return steps;
}

function setSzElPosition(elId, x, y) {
  const svg = document.getElementById('sz-pitch');
  if (!svg) return;
  const g = svg.querySelector('[data-el-id="' + elId + '"]');
  if (g && g.tagName.toLowerCase() === 'g' && !g.classList.contains('sz-pfeil')) {
    g.setAttribute('transform', 'translate(' + x + ',' + y + ')');
  }
}

function szEaseInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

function startSzAnimation(sz) {
  if (szAnimRunning) return;
  const steps = buildAnimSteps(sz);
  if (steps.length === 0) {
    alert('Kein animierbarer Pfeil gefunden. Lege mindestens einen Pass-, Lauf- oder Dribbel-Pfeil mit Spieler oder Ball am Startpunkt an.');
    return;
  }

  const allPfeile = (sz.elemente || []).filter(e => e.type === 'pfeil');
  const pfeileByPhase = {};
  allPfeile.forEach(p => {
    const ph = getPfeilPhase(p, allPfeile);
    if (!pfeileByPhase[ph]) pfeileByPhase[ph] = [];
    pfeileByPhase[ph].push(p.id);
  });

  szAnimRunning = true;
  szSelectedElId = null;
  szPfeilStart = null;
  renderSpielzuegeTab();

  // Initial: alle Pfeile ausblenden
  const svg = document.getElementById('sz-pitch');
  if (svg) {
    svg.querySelectorAll('.sz-pfeil').forEach(g => g.classList.add('anim-hidden'));
  }

  const STEP_DUR = 1400;
  const PAUSE = 250;
  const FADE_IN = 350;
  const INITIAL_DELAY = 450;
  let stepIdx = 0;

  function runStep() {
    if (!szAnimRunning) return;
    if (stepIdx >= steps.length) {
      szAnimTimeout = setTimeout(() => { stopSzAnimation(); }, 900);
      return;
    }
    const step = steps[stepIdx];
    const phaseNum = step.phase;

    // Pfeile der aktuellen Phase einblenden
    const svg2 = document.getElementById('sz-pitch');
    if (svg2 && phaseNum != null) {
      const ids = pfeileByPhase[phaseNum] || [];
      ids.forEach(id => {
        const g = svg2.querySelector('[data-el-id="' + id + '"]');
        if (g) g.classList.remove('anim-hidden');
      });
    }

    // Kurze Fade-In Zeit, dann Bewegung
    szAnimTimeout = setTimeout(() => {
      if (!szAnimRunning) return;
      const stepStart = performance.now();
      function frame(now) {
        if (!szAnimRunning) return;
        const elapsed = now - stepStart;
        const t = Math.min(1, elapsed / STEP_DUR);
        const eased = szEaseInOut(t);
        step.moves.forEach(m => {
          const x = m.from.x + (m.to.x - m.from.x) * eased;
          const y = m.from.y + (m.to.y - m.from.y) * eased;
          setSzElPosition(m.elId, x, y);
        });
        if (t < 1) {
          szAnimRAF = requestAnimationFrame(frame);
        } else {
          step.moves.forEach(m => setSzElPosition(m.elId, m.to.x, m.to.y));
          stepIdx++;
          szAnimTimeout = setTimeout(runStep, PAUSE);
        }
      }
      szAnimRAF = requestAnimationFrame(frame);
    }, FADE_IN);
  }

  szAnimTimeout = setTimeout(runStep, INITIAL_DELAY);
}

function stopSzAnimation() {
  if (szAnimRAF) cancelAnimationFrame(szAnimRAF);
  if (szAnimTimeout) clearTimeout(szAnimTimeout);
  szAnimRAF = null;
  szAnimTimeout = null;
  if (!szAnimRunning) return;
  szAnimRunning = false;
  renderSpielzuegeTab();
}

document.addEventListener('keydown', (e) => {
  if (spielzuegeView !== 'edit' || !editingSpielzugId) return;
  if (szAnimRunning) {
    if (e.key === 'Escape') stopSzAnimation();
    return;
  }
  if (e.key === 'Escape') {
    if (szZoneDrawing) { szZoneDrawing = null; renderSpielzuegeTab(); return; }
    if (szPfeilStart) { szPfeilStart = null; renderSpielzuegeTab(); return; }
  }
  const activeTag = document.activeElement ? document.activeElement.tagName : '';
  if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;
  if (e.key !== 'Delete' && e.key !== 'Backspace') return;
  if (!szSelectedElId) return;
  const sz = db.spielzuege.find(x => x.id === editingSpielzugId);
  if (!sz) return;
  sz.elemente = sz.elemente.filter(x => x.id !== szSelectedElId);
  szSelectedElId = null;
  saveDb();
  renderSpielzuegeTab();
});

document.getElementById('picker-modal-cancel').onclick = closePickerModal;

};

  if (document.getElementById('spieler-modal').classList.contains('open')) closeSpielerModal();
  else if (document.getElementById('termin-modal').classList.contains('open')) closeTerminModal();
  else if (document.getElementById('uebung-modal').classList.contains('open')) closeUebungModal();

  else if (document.getElementById('picker-modal').classList.contains('open')) closePickerModal();
});

document.getElementById('export-btn').onclick = () => {
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'coach_backup_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('import-btn').onclick = () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (!imported || !imported.meta || !Array.isArray(imported.spieler)) {
          alert('Ungültiges Backup-Format.');
          return;
        }
        if (!confirm('Bestehende Daten überschreiben? Empfehlung: vorher exportieren.')) return;
        db = Object.assign({}, DEFAULT_DB, imported);
        saveDb();
        renderActiveTeam();
        renderSpielerTab();
        renderTermineTab();
        renderAufstellungenTab();
        renderUebungenTab();
        renderTrainingsplaeneTab();
        renderSpielzuegeTab();
        alert('Import erfolgreich.');
      } catch (err) {
        alert('Fehler beim Import: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
};

// PWA: Service-Worker registrieren (nur unter https:// oder localhost — file:// wird übersprungen)

    }).catch((err) => {
      console.warn('[Coach] Service-Worker-Registrierung fehlgeschlagen:', err);
    });
  });
}
