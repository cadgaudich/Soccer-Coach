<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Coach · Jugendtraining</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#639922">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Coach">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
:root {
  --bg: #f7f7f4;
  --surface: #ffffff;
  --surface-2: #f1efe8;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.16);
  --text: #2c2c2a;
  --text-2: #5f5e5a;
  --text-3: #888780;
  --accent: #639922;
  --accent-bg: #eaf3de;
  --accent-text: #27500a;
  --warn-bg: #FAEEDA;
  --warn-text: #633806;
  --danger: #E24B4A;
  --danger-bg: #FCEBEB;
  --danger-text: #791F1F;
  --info-bg: #E6F1FB;
  --info-text: #0C447C;
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow-modal: 0 12px 40px rgba(0,0,0,0.18);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
[data-theme="dark"] {
  --bg: #1a1a18;
  --surface: #242422;
  --surface-2: #2d2d2a;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --text: #e8e6df;
  --text-2: #b4b2a9;
  --text-3: #888780;
  --accent-bg: rgba(99,153,34,0.20);
  --accent-text: #97C459;
  --warn-bg: rgba(186,117,23,0.20);
  --warn-text: #FAC775;
  --danger-bg: rgba(226,75,74,0.18);
  --danger-text: #F09595;
  --info-bg: rgba(24,95,165,0.20);
  --info-text: #85B7EB;
  --shadow-modal: 0 12px 40px rgba(0,0,0,0.55);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--font); font-size: 14px; color: var(--text); background: var(--bg); line-height: 1.5; }

.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo {
  width: 30px; height: 30px; border-radius: var(--radius);
  background: var(--accent); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 14px; letter-spacing: 0.5px;
}
.brand-name { font-weight: 600; font-size: 15px; }
.brand-team { font-size: 12px; color: var(--text-2); padding-left: 14px; border-left: 1px solid var(--border); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-2);
  cursor: pointer; font-size: 14px; font-family: inherit; line-height: 1;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

.tab-nav { display: flex; gap: 2px; padding: 6px 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tab {
  padding: 8px 14px; font-size: 13px; color: var(--text-2);
  background: transparent; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.tab:hover { background: var(--surface-2); color: var(--text); }
.tab.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

.stats { display: flex; gap: 12px; margin-bottom: 16px; }
.stat { padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); flex: 1; }
.stat-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 22px; font-weight: 600; margin-top: 4px; line-height: 1.1; }

.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.search {
  flex: 1; min-width: 200px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); font-family: inherit; font-size: 13px; color: var(--text);
}
.search:focus { outline: none; border-color: var(--accent); }

.btn {
  padding: 8px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-family: inherit; font-size: 13px; cursor: pointer;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn-primary:hover { background: #527d1c; border-color: #527d1c; color: white; }
.btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger-bg); }

table {
  width: 100%; border-collapse: collapse;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  background: var(--surface-2); border-bottom: 1px solid var(--border);
}
td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; }
tbody tr:hover td { background: var(--surface-2); }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 500;
}
.badge-fit { background: var(--accent-bg); color: var(--accent-text); }
.badge-fraglich { background: var(--warn-bg); color: var(--warn-text); }
.badge-krank, .badge-verletzt { background: var(--danger-bg); color: var(--danger-text); }
.badge-cap { background: var(--warn-bg); color: var(--warn-text); margin-left: 6px; }

.pos-pill {
  display: inline-block; padding: 2px 7px;
  background: var(--info-bg); color: var(--info-text);
  border-radius: var(--radius-sm); font-size: 11px; font-weight: 500;
}

.row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.1s; justify-content: flex-end; }
tr:hover .row-actions { opacity: 1; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  width: 100%; max-width: 540px; max-height: calc(100vh - 48px);
  display: flex; flex-direction: column; box-shadow: var(--shadow-modal);
}
.modal-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-title { font-size: 16px; font-weight: 600; margin: 0; }
.modal-body { padding: 18px 20px; overflow-y: auto; }
.modal-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; gap: 8px;
}
.modal-footer-right { display: flex; gap: 8px; }

.form-row {
  display: grid; grid-template-columns: 140px 1fr; gap: 12px;
  align-items: center; margin-bottom: 11px;
}
.form-row label { font-size: 13px; color: var(--text-2); }
.form-row input, .form-row select, .form-row textarea {
  padding: 7px 10px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; color: var(--text); width: 100%;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-row textarea { min-height: 60px; resize: vertical; font-family: inherit; }
.inline-check { display: flex; align-items: center; gap: 8px; }
.inline-check input[type="checkbox"] { width: auto; }
.inline-check label { color: var(--text); cursor: pointer; }

.empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
.empty p { margin: 8px 0; }

.placeholder {
  padding: 80px 20px; text-align: center; color: var(--text-3);
  background: var(--surface); border: 1px dashed var(--border-strong); border-radius: var(--radius-lg);
}
.placeholder h3 { margin: 0 0 8px; color: var(--text-2); font-weight: 500; font-size: 16px; }
.placeholder p { margin: 4px 0; font-size: 13px; }

.app-footer {
  text-align: center; padding: 16px;
  font-size: 11px; color: var(--text-3);
}

.filter-pills {
  display: flex; gap: 2px; padding: 3px;
  background: var(--surface-2); border-radius: var(--radius);
  width: fit-content;
}
.filter-pill {
  padding: 6px 14px; font-size: 12px; color: var(--text-2);
  background: transparent; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit;
}
.filter-pill:hover { color: var(--text); }
.filter-pill.active { background: var(--surface); color: var(--text); font-weight: 500; }

.termin-list { display: flex; flex-direction: column; gap: 8px; }
.termin-card {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
}
.termin-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
.termin-card.past { opacity: 0.7; }
.termin-date {
  display: flex; flex-direction: column; align-items: center;
  min-width: 52px; padding: 6px 8px;
  background: var(--surface-2); border-radius: var(--radius-sm);
}
.termin-card.past .termin-date { background: transparent; border: 1px solid var(--border); }
.termin-date-d { font-size: 18px; font-weight: 600; line-height: 1; }
.termin-date-m { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
.termin-body { flex: 1; min-width: 0; }
.termin-titel { font-size: 14px; font-weight: 500; margin: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.termin-meta { font-size: 12px; color: var(--text-2); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
.termin-typ-badge { font-size: 10px; padding: 2px 7px; border-radius: var(--radius-sm); font-weight: 500; letter-spacing: 0.3px; }
.termin-typ-training { background: var(--info-bg); color: var(--info-text); }
.termin-typ-spiel { background: var(--accent-bg); color: var(--accent-text); }
.termin-typ-turnier { background: var(--warn-bg); color: var(--warn-text); }
.termin-aw { font-size: 12px; color: var(--text-2); white-space: nowrap; text-align: right; }
.termin-aw strong { color: var(--text); font-weight: 600; }

.anwesenheit-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
.anwesenheit-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
.anwesenheit-title { font-size: 13px; font-weight: 500; margin: 0; color: var(--text); }
.anwesenheit-summary { font-size: 11px; color: var(--text-2); }
.anwesenheit-list { display: flex; flex-direction: column; gap: 3px; max-height: 280px; overflow-y: auto; padding-right: 2px; }
.aw-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; background: var(--surface-2);
  border-radius: var(--radius-sm);
}
.aw-num { width: 22px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text-2); }
.aw-name { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.aw-pos { font-size: 10px; color: var(--text-3); }
.aw-buttons { display: flex; gap: 2px; }
.aw-btn {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-size: 12px; color: var(--text-2); padding: 0; line-height: 1;
}
.aw-btn:hover { background: var(--bg); }
.aw-btn.active.aw-zu { background: var(--accent); border-color: var(--accent); color: white; }
.aw-btn.active.aw-fr { background: #BA7517; border-color: #BA7517; color: white; }
.aw-btn.active.aw-ab { background: var(--danger); border-color: var(--danger); color: white; }

.conditional-row {
  display: grid; grid-template-columns: 140px 1fr; gap: 12px;
  align-items: center; margin-bottom: 11px;
}
.conditional-row.hidden { display: none; }

.aufst-list-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.aufst-list-card {
  padding: 14px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; display: flex; flex-direction: column; gap: 8px;
}
.aufst-list-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
.aufst-list-card-name { font-size: 15px; font-weight: 500; margin: 0; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.aufst-list-card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.aufst-form-badge { font-size: 11px; padding: 2px 7px; background: var(--accent-bg); color: var(--accent-text); border-radius: var(--radius-sm); font-weight: 500; }
.aufst-var-badge { font-size: 11px; padding: 2px 7px; background: var(--surface-2); color: var(--text-2); border-radius: var(--radius-sm); }
.aufst-list-card-info { font-size: 12px; color: var(--text-2); }

.aufst-editor-top {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.aufst-back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: transparent; border: 1px solid var(--border);
  padding: 6px 12px; border-radius: var(--radius-sm);
  cursor: pointer; color: var(--text-2); font-family: inherit; font-size: 13px;
}
.aufst-back-btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-2); }
.aufst-editor-top input[type="text"] {
  font-size: 16px; font-weight: 500; padding: 7px 10px;
  background: transparent; border: 1px solid transparent;
  width: 240px; color: var(--text); border-radius: var(--radius-sm);
  font-family: inherit;
}
.aufst-editor-top input[type="text"]:hover { border-color: var(--border); }
.aufst-editor-top input[type="text"]:focus {
  border-color: var(--accent); background: var(--surface-2); outline: none;
}
.aufst-editor-top select {
  padding: 7px 10px; font-size: 13px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
}
.aufst-spacer { flex: 1; }
.aufst-count {
  font-size: 13px; color: var(--text-2);
  padding: 6px 12px; background: var(--surface-2);
  border-radius: var(--radius-sm);
}
.aufst-count strong { color: var(--accent-text); font-weight: 600; }

.aufst-layout {
  display: grid; grid-template-columns: 1fr 280px; gap: 24px;
  align-items: start;
}
@media (max-width: 760px) {
  .aufst-layout { grid-template-columns: 1fr; }
}
.aufst-pitch-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.aufst-instruction {
  font-size: 12px; color: var(--text-2); text-align: center;
  padding: 6px 14px; background: var(--surface-2); border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.aufst-instruction.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }

.pitch-svg {
  width: 100%; max-width: 460px; height: auto; display: block;
  border-radius: var(--radius-sm);
}
.pitch-slot { cursor: pointer; }
.pitch-slot circle {
  fill: rgba(255,255,255,0.94);
  stroke: rgba(0,0,0,0.25);
  stroke-width: 0.3;
  transition: fill 0.12s, r 0.12s;
}
.pitch-slot.empty circle {
  fill: rgba(255,255,255,0.12);
  stroke: rgba(255,255,255,0.55);
  stroke-dasharray: 0.8 0.8;
}
.pitch-slot.selected circle {
  fill: var(--accent);
  stroke: white;
  stroke-width: 0.8;
}
.pitch-slot:hover circle { fill: white; }
.pitch-slot.selected:hover circle { fill: var(--accent); }
.pitch-slot .slot-num {
  font-size: 5.5px; font-weight: 700;
  text-anchor: middle; dominant-baseline: central;
  fill: #2a2a2a; pointer-events: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.pitch-slot.selected .slot-num { fill: white; }
.pitch-slot .slot-plus {
  font-size: 7px; font-weight: 300;
  text-anchor: middle; dominant-baseline: central;
  fill: rgba(255,255,255,0.85); pointer-events: none;
}
.pitch-slot .slot-label {
  font-size: 2.8px; text-anchor: middle;
  fill: rgba(255,255,255,0.95); pointer-events: none;
  font-weight: 500; letter-spacing: 0.3px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.aufst-sidebar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
}
.aufst-sidebar-h { font-size: 13px; font-weight: 500; margin: 0 0 10px; color: var(--text); }
.kader-list { display: flex; flex-direction: column; gap: 4px; max-height: 500px; overflow-y: auto; padding-right: 2px; }
.kader-card {
  display: flex; align-items: center; gap: 8px; padding: 7px 9px;
  background: var(--surface-2); border-radius: var(--radius-sm);
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.kader-card:hover { background: var(--bg); border-color: var(--border-strong); }
.kader-card.placed { opacity: 0.55; }
.kader-card.placed:hover { opacity: 0.85; }
.kader-num { width: 22px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }
.kader-name { flex: 1; font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kader-pos { font-size: 10px; color: var(--text-3); flex-shrink: 0; }
.kader-slot-badge {
  font-size: 9px; padding: 2px 6px;
  background: var(--accent); color: white;
  border-radius: 3px; font-weight: 600; letter-spacing: 0.3px;
  flex-shrink: 0;
}

.uebung-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.uebung-card {
  display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  overflow: hidden;
  transition: border-color 0.12s, transform 0.12s;
}
.uebung-card:hover { border-color: var(--border-strong); }
.uebung-icon-band {
  height: 70px; display: flex; align-items: center; justify-content: center;
  background: var(--surface-2); position: relative;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
.uebung-icon-band-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}
.uebung-icon { font-size: 32px; line-height: 1; filter: saturate(0.85); position: relative; z-index: 1; }
.uebung-kat-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; padding: 2px 7px; border-radius: var(--radius-sm);
  font-weight: 500; letter-spacing: 0.3px; z-index: 2;
  backdrop-filter: blur(4px);
}
.uebung-kat-aufwaermen { background: var(--info-bg); color: var(--info-text); }
.uebung-kat-technik { background: var(--accent-bg); color: var(--accent-text); }
.uebung-kat-spielform { background: var(--warn-bg); color: var(--warn-text); }
.uebung-kat-abschluss { background: rgba(189, 76, 145, 0.18); color: #8a2e6a; }
[data-theme="dark"] .uebung-kat-abschluss { background: rgba(189, 76, 145, 0.22); color: #e09bc6; }
.uebung-kat-konditionell { background: rgba(91, 105, 170, 0.18); color: #3a4994; }
[data-theme="dark"] .uebung-kat-konditionell { background: rgba(91, 105, 170, 0.25); color: #adb6e0; }
.uebung-kat-raumdeckung { background: rgba(110, 70, 160, 0.18); color: #5a3d99; }
.uebung-kat-manndeckung { background: rgba(180, 70, 100, 0.18); color: #913457; }
.uebung-kat-viererkette { background: rgba(60, 110, 130, 0.18); color: #2a4f60; }
.uebung-kat-dreierkette { background: rgba(140, 100, 50, 0.18); color: #6d4520; }
[data-theme="dark"] .uebung-kat-raumdeckung { background: rgba(140, 100, 200, 0.22); color: #c4a4f0; }
[data-theme="dark"] .uebung-kat-manndeckung { background: rgba(200, 100, 130, 0.22); color: #f0a4c0; }
[data-theme="dark"] .uebung-kat-viererkette { background: rgba(90, 140, 170, 0.22); color: #a4c8e0; }
[data-theme="dark"] .uebung-kat-dreierkette { background: rgba(170, 130, 80, 0.22); color: #e0c490; }

.uebung-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
.uebung-name { font-size: 14px; font-weight: 500; margin: 0; color: var(--text); }
.uebung-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-2); flex-wrap: wrap; }
.uebung-meta-item { display: inline-flex; align-items: center; gap: 3px; }
.uebung-beschreibung {
  font-size: 12px; color: var(--text-2); line-height: 1.45;

.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  padding: 4px 6px; background: var(--bg);

}

.tag-chip {
  display: inline-flex; align-items: center; gap: 4px;

}
.tag-chip-remove {

.tag-input {

}
.tag-input:focus { outline: none; }

.range-row {
  display: grid; grid-template-columns: 140px 1fr; gap: 12px;

}
.range-inputs { display: flex; gap: 8px; align-items: center; }
.range-inputs input[type="number"] { width: 70px; }
.range-inputs span { color: var(--text-2); font-size: 12px; }

.u-img-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  padding: 4px;
}
.u-img-thumb {
  position: relative; aspect-ratio: 4/3;
  background: var(--surface-2); border-radius: var(--radius-sm);
  overflow: hidden; border: 1px solid var(--border);
}
.u-img-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.u-img-thumb-full { grid-column: 1 / -1; aspect-ratio: 16/9; }
.u-img-remove {
  position: absolute; top: 6px; right: 6px;
  width: 26px; height: 26px;
  background: rgba(0,0,0,0.6); color: white;
  border: none; border-radius: 50%; cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0;
  display: flex; align-items: center; justify-content: center;
}
.u-img-remove:hover { background: var(--danger); }
.u-img-upload {
  display: flex; align-items: center; justify-content: center;
  aspect-ratio: 4/3;
  background: transparent; border: 1px dashed var(--border-strong);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-size: 12px; color: var(--text-2);
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.u-img-upload:hover { border-color: var(--accent); color: var(--accent-text); background: var(--accent-bg); }
.u-img-upload.full { grid-column: 1 / -1; aspect-ratio: 16/4; }

.mode-switch {
  display: inline-flex; gap: 2px; padding: 3px;
  background: var(--surface-2); border-radius: var(--radius);
  margin-right: 8px;
}
.mode-pill {
  padding: 5px 12px; font-size: 12px; font-weight: 500;
  background: transparent; border: none; cursor: pointer;
  color: var(--text-2); border-radius: var(--radius-sm); font-family: inherit;
}
.mode-pill:hover { color: var(--text); }
.mode-pill.active { background: var(--surface); color: var(--text); }

.sz-viewer-description {

/* Kids-Viewer für Übung */
.u-viewer-img-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.u-viewer-img {

}
.u-viewer-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.u-viewer-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--text-2); margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

.u-viewer-mat-chip { font-size: 12px; padding: 3px 8px; background: var(--surface-2); border-radius: var(--radius-sm); color: var(--text); }

.tp-list-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.tp-list-card {
  display: flex; flex-direction: column; gap: 8px;

}
.tp-list-card:hover { border-color: var(--border-strong); background: var(--surface-2); }
.tp-list-card-name { font-size: 15px; font-weight: 500; margin: 0; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tp-list-card-meta { font-size: 12px; color: var(--text-2); display: flex; gap: 10px; flex-wrap: wrap; }
.tp-list-card-meta strong { color: var(--accent-text); font-weight: 600; }

.tp-editor-top {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; padding-bottom: 12px;

}
.tp-editor-top input[type="text"] {
  font-size: 16px; font-weight: 500; padding: 7px 10px;

  font-family: inherit;
}
.tp-editor-top input[type="text"]:hover { border-color: var(--border); }
.tp-editor-top input[type="text"]:focus {
  border-color: var(--accent); background: var(--surface-2); outline: none;
}
.tp-editor-top input[type="date"] {
  padding: 7px 10px; font-size: 13px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
}
.tp-editor-top .aufst-spacer { flex: 1; }

.tp-phase {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 14px; overflow: hidden;
}
.tp-phase-head {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.tp-phase-name { font-size: 14px; font-weight: 600; margin: 0; flex: 1; color: var(--text); }
.tp-phase-stats { font-size: 12px; color: var(--text-2); }
.tp-phase-stats strong { color: var(--text); font-weight: 600; }
.tp-phase-body { padding: 8px; }
.tp-phase-empty {
  text-align: center; padding: 18px 8px;
  font-size: 12px; color: var(--text-3);
}

.tp-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; margin-bottom: 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.tp-item:last-child { margin-bottom: 6px; }
.tp-item-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
.tp-item-body { flex: 1; min-width: 0; cursor: pointer; }
.tp-item-name {
  font-size: 13px; font-weight: 500; margin: 0; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tp-item-meta { font-size: 11px; color: var(--text-2); display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.tp-item-meta .uebung-kat-badge {
  position: static; padding: 1px 6px; font-size: 9px;
}
.tp-item-notiz {
  font-size: 11px; color: var(--text-2); font-style: italic;
  margin-top: 3px; padding-left: 1px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.tp-item-dauer {
  font-size: 12px; font-weight: 500; color: var(--text);
  padding: 3px 8px; background: var(--surface-2);
  border-radius: var(--radius-sm); flex-shrink: 0; min-width: 48px; text-align: center;
}
.tp-item-dauer.override { background: var(--accent-bg); color: var(--accent-text); }
.tp-item-actions { display: flex; gap: 2px; flex-shrink: 0; }
.tp-item-actions .icon-btn { width: 26px; height: 26px; font-size: 13px; }

.tp-phase-add {
  width: 100%; padding: 9px 10px;
  background: transparent; border: 1px dashed var(--border-strong);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-size: 12px; color: var(--text-2);
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.tp-phase-add:hover { border-color: var(--accent); color: var(--accent-text); background: var(--accent-bg); }

.picker-toolbar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  margin-bottom: 12px;
}
.picker-search {
  flex: 1; min-width: 180px; padding: 7px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text);
}
.picker-search:focus { outline: none; border-color: var(--accent); }
.picker-list {
  display: flex; flex-direction: column; gap: 5px;
  max-height: 380px; overflow-y: auto;
}
.picker-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--surface-2);
  border: 1px solid transparent; border-radius: var(--radius-sm);
  cursor: pointer;
}
.picker-row:hover { background: var(--bg); border-color: var(--accent); }
.picker-row-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
.picker-row-body { flex: 1; min-width: 0; }
.picker-row-name { font-size: 13px; font-weight: 500; margin: 0; color: var(--text); }
.picker-row-meta { font-size: 11px; color: var(--text-2); display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; align-items: center; }
.picker-row-meta .uebung-kat-badge { position: static; padding: 1px 6px; font-size: 9px; }
.picker-empty { padding: 30px 10px; text-align: center; font-size: 12px; color: var(--text-3); }

.sz-list-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.sz-list-card {
  display: flex; flex-direction: column; gap: 8px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; overflow: hidden;
}
.sz-list-card:hover { border-color: var(--border-strong); }
.sz-list-thumb {
  height: 140px; background: linear-gradient(180deg, #5e8c1f, #4a7117);
  display: block; position: relative;
}
.sz-list-thumb svg { width: 100%; height: 100%; display: block; }
.sz-list-body { padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 6px; }
.sz-list-name { font-size: 14px; font-weight: 500; margin: 0; color: var(--text); }
.sz-list-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.sz-kat-badge { font-size: 10px; padding: 2px 7px; border-radius: var(--radius-sm); font-weight: 500; letter-spacing: 0.3px; }
.sz-kat-angriff { background: var(--accent-bg); color: var(--accent-text); }
.sz-kat-standard { background: var(--info-bg); color: var(--info-text); }
.sz-kat-pressing { background: var(--warn-bg); color: var(--warn-text); }
.sz-kat-defensiv { background: var(--danger-bg); color: var(--danger-text); }
.sz-kat-raumdeckung { background: rgba(110, 70, 160, 0.18); color: #5a3d99; }
.sz-kat-manndeckung { background: rgba(180, 70, 100, 0.18); color: #913457; }
.sz-kat-viererkette { background: rgba(60, 110, 130, 0.18); color: #2a4f60; }
.sz-kat-dreierkette { background: rgba(140, 100, 50, 0.18); color: #6d4520; }
[data-theme="dark"] .sz-kat-raumdeckung { background: rgba(140, 100, 200, 0.22); color: #c4a4f0; }
[data-theme="dark"] .sz-kat-manndeckung { background: rgba(200, 100, 130, 0.22); color: #f0a4c0; }
[data-theme="dark"] .sz-kat-viererkette { background: rgba(90, 140, 170, 0.22); color: #a4c8e0; }
[data-theme="dark"] .sz-kat-dreierkette { background: rgba(170, 130, 80, 0.22); color: #e0c490; }

.sz-editor-top {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.sz-editor-top input[type="text"] {
  font-size: 16px; font-weight: 500; padding: 7px 10px;
  background: transparent; border: 1px solid transparent;
  width: 240px; color: var(--text); border-radius: var(--radius-sm);
  font-family: inherit;
}
.sz-editor-top input[type="text"]:hover { border-color: var(--border); }
.sz-editor-top input[type="text"]:focus {
  border-color: var(--accent); background: var(--surface-2); outline: none;
}
.sz-editor-top select {
  padding: 7px 10px; font-size: 13px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: inherit;
}

.sz-layout {
  display: grid; grid-template-columns: 64px 1fr 280px; gap: 14px;
  align-items: start;
}
@media (max-width: 900px) {
  .sz-layout { grid-template-columns: 1fr; }
  .sz-toolbar { flex-direction: row !important; }
}

.sz-toolbar {
  display: flex; flex-direction: column; gap: 4px;
  padding: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  position: sticky; top: 12px;
}
.sz-tool {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent;
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-size: 18px; color: var(--text-2); padding: 0;
  position: relative;
}
.sz-tool:hover { background: var(--surface-2); color: var(--text); }
.sz-tool.active { background: var(--accent); color: white; border-color: var(--accent); }
.sz-tool[disabled] { opacity: 0.35; cursor: not-allowed; }
.sz-tool[disabled]:hover { background: transparent; }
.sz-tool-divider { height: 1px; background: var(--border); margin: 4px 2px; }

.sz-pitch-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.sz-instruction {
  width: 100%; font-size: 12px; color: var(--text-2); text-align: center;
  padding: 6px 12px; background: var(--surface-2); border-radius: var(--radius-sm);
  transition: background 0.15s, color 0.15s;
}
.sz-instruction.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
.sz-instruction.danger { background: var(--danger-bg); color: var(--danger-text); font-weight: 500; display: flex; justify-content: center; align-items: center; gap: 10px; }
.sz-instruction-del {
  padding: 3px 10px; font-size: 11px;
  background: var(--danger); color: white;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; font-weight: 500;
}
.sz-instruction-del:hover { opacity: 0.9; }

.sz-pitch {
  width: 100%; max-width: 460px; height: auto; display: block;
  border-radius: var(--radius-sm); user-select: none;
}
.sz-pitch.tool-place { cursor: copy; }
.sz-pitch.tool-pfeil { cursor: crosshair; }
.sz-pitch.tool-select { cursor: default; }

.sz-el { cursor: move; }
.sz-el.selected .sz-el-bg { stroke: white; stroke-width: 0.6; }
.sz-el.selected .sz-el-halo {
  fill: none; stroke: var(--accent);
  stroke-width: 0.4; stroke-dasharray: 0.8 0.8;
}
.sz-el-spieler { fill: #4a90e2; }
.sz-el-gegner { fill: #e24b4a; }
.sz-el-ball { fill: white; stroke: #1a1a18; stroke-width: 0.2; }
.sz-el-num {
  font-size: 4px; font-weight: 700; fill: white;
  text-anchor: middle; dominant-baseline: central;
  pointer-events: none; user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.sz-el-x {
  font-size: 5px; font-weight: 700; fill: white;
  text-anchor: middle; dominant-baseline: central;
  pointer-events: none; user-select: none;
}

.sz-pfeil { cursor: pointer; }
.sz-pfeil.selected line, .sz-pfeil.selected path { stroke: var(--accent) !important; stroke-width: 0.9 !important; }
.sz-pfeil-lauf { stroke: white; stroke-width: 0.7; fill: none; }
.sz-pfeil-pass { stroke: white; stroke-width: 0.7; fill: none; stroke-dasharray: 2 1.2; }
.sz-pfeil-dribbel { stroke: white; stroke-width: 0.7; fill: none; }
.sz-pfeil.foe .sz-pfeil-lauf,
.sz-pfeil.foe .sz-pfeil-pass,
.sz-pfeil.foe .sz-pfeil-dribbel { stroke: #ff6b5e; }
.sz-pfeil.foe.selected .sz-pfeil-lauf,
.sz-pfeil.foe.selected .sz-pfeil-pass,
.sz-pfeil.foe.selected .sz-pfeil-dribbel { stroke: var(--accent) !important; }
.sz-pfeil.foe .sz-phase-badge circle { fill: rgba(160,0,0,0.75); }
.sz-pfeil-hit { stroke: transparent; stroke-width: 5; fill: none; pointer-events: stroke; }

.sz-pfeil { transition: opacity 0.35s ease-out; }

function relDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function parseISODate(s) {
  if (!s) return null;
  const parts = s.split('-');
  if (parts.length !== 3) return null;
  const y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}

function formatDateDE(s) {
  const d = parseISODate(s);
  if (!d) return s || '';
  return d.getDate() + '. ' + MONATE_KURZ[d.getMonth()] + ' ' + d.getFullYear();
}

function isPastDate(s) {
  const d = parseISODate(s);
  if (!d) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return d < today;
}

function newId(prefix) {
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

    ],
    aufstellungen: [
      {
        id: newId('aufst'),
        mannschaft_id: teamId,
        name: 'Standard 4-3-3',
        formation: '4-3-3',
        variante: 'Standard',
        positionen: { '0': sps[0].id, '2': sps[1].id, '3': sps[2].id, '6': sps[3].id, '5': sps[4].id, '9': sps[5].id, '8': sps[6].id }
      }
    ],
    uebungen: [],
    trainingsplaene: []
  });
  const seedUe = getSeedUebungen();
  fresh.uebungen = seedUe;
  const findUe = (name) => seedUe.find(u => u.name === name);
  const passq = findUe('Passquadrat 4v2');
  const passmuster = findUe('Passmuster Y-Form');
  const fluegel = findUe('Flügelangriff & Hereingabe');

    }];
  }
  fresh.spielzuege = getSeedSpielzuege(teamId);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(fresh));
  return fresh;
}

function loadDb() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seedDb();
    const parsed = JSON.parse(raw);
    return Object.assign({}, DEFAULT_DB, parsed);
  } catch (e) {
    console.error('DB-Load fehlgeschlagen, neu seeden:', e);
    return seedDb();
  }
}

function getPfeilPhase(p, allPfeile) {
  if (p.phase != null) return p.phase;
  const idx = (allPfeile || []).indexOf(p);
  return idx >= 0 ? idx + 1 : 1;
}

function getMaxPhase(sz) {
  const pfeile = (sz.elemente || []).filter(e => e.type === 'pfeil');
  if (pfeile.length === 0) return 0;
  return Math.max.apply(null, pfeile.map(p => getPfeilPhase(p, pfeile)));
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem(THEME_KEY, theme);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'light');

const APP_MODE_KEY = 'welp_coach_app_mode';
let appMode = (localStorage.getItem(APP_MODE_KEY) === 'kids') ? 'kids' : 'coach';
document.documentElement.dataset.appMode = appMode;

function updateModePills() {
  document.querySelectorAll('.mode-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === appMode);
  });
}

function setAppMode(mode) {
  if (mode !== 'kids' && mode !== 'coach') return;
  if (mode === appMode) return;
  if (typeof spielzuegeView !== 'undefined' && spielzuegeView === 'edit') closeSpielzugEditor();
  if (typeof aufstellungenView !== 'undefined' && aufstellungenView === 'edit') closeAufstellungEditor();
  if (typeof trainingsplaeneView !== 'undefined' && trainingsplaeneView === 'edit') closeTrainingsplanEditor();
  document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  appMode = mode;
  document.documentElement.dataset.appMode = mode;
  localStorage.setItem(APP_MODE_KEY, mode);
  updateModePills();

  if (mode === 'kids') {
    const activeTab = document.querySelector('.tab.active');
    if (activeTab && (activeTab.dataset.tab === 'spieler' || activeTab.dataset.tab === 'aufstellungen')) {
      const target = document.querySelector('.tab[data-tab="spielzuege"]');
      if (target) target.click();
      return;
    }
  }
  const activeTab = document.querySelector('.tab.active');
  if (activeTab && TAB_RENDERERS[activeTab.dataset.tab]) {
    TAB_RENDERERS[activeTab.dataset.tab]();
  }
}

document.getElementById('theme-toggle').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  applyTheme(next);
};

const tabs = document.querySelectorAll('.tab');
const tabContents = document.querySelectorAll('.tab-content');
const TAB_RENDERERS = {};
tabs.forEach(tab => {
  tab.onclick = () => {
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    tabContents.forEach(c => { c.hidden = c.id !== ('tab-' + tab.dataset.tab); });
    const r = TAB_RENDERERS[tab.dataset.tab];
    if (r) r();
  };
});

  const q = searchTerm.toLowerCase().trim();

    ? list.filter(s => (s.vorname + ' ' + s.nachname + ' ' + s.position + ' ' + s.trikotnummer).toLowerCase().includes(q))

function closeSpielerModal() {
  document.getElementById('spieler-modal').classList.remove('open');

}

function saveSpielerModal() {
  const g = (id) => document.getElementById(id);
  const data = {
    trikotnummer: parseInt(g('f-trikotnummer').value, 10),
    vorname: g('f-vorname').value.trim(),
    nachname: g('f-nachname').value.trim(),
    position: g('f-position').value,
    geburtsjahr: parseInt(g('f-geburtsjahr').value, 10) || (new Date().getFullYear() - 14),
    status: g('f-status').value,
    ist_kapitaen: g('f-kapitaen').checked,
    eltern_kontakt: g('f-eltern').value.trim(),
    notizen: g('f-notizen').value.trim()
  };

  if (!data.vorname || !data.nachname || !data.trikotnummer) {
    alert('Trikotnummer, Vorname und Nachname sind Pflicht.');
    return;
  }

  if (editingSpielerId) {
    const existing = db.spieler.find(s => s.id === editingSpielerId);
    Object.assign(existing, data);
  } else {
    db.spieler.push(mkSpieler(db.meta.active_mannschaft_id, data));
  }
  saveDb();
  renderSpielerTab();
  closeSpielerModal();
}

function deleteSpielerModal() {
  if (!editingSpielerId) return;
  const s = db.spieler.find(x => x.id === editingSpielerId);
  if (!s) return;
  if (!confirm('Spieler "' + s.vorname + ' ' + s.nachname + '" wirklich löschen?')) return;
  db.spieler = db.spieler.filter(x => x.id !== editingSpielerId);
  saveDb();
  renderSpielerTab();
  closeSpielerModal();
}

function getActiveTermine() {
  return db.termine.filter(t => t.mannschaft_id === db.meta.active_mannschaft_id);
}

function renderTermineTab() {
  const all = getActiveTermine();
  const upcoming = all.filter(t => !isPastDate(t.datum));
  const past = all.filter(t => isPastDate(t.datum));

  let visible;
  if (terminFilter === 'kommend') {
    visible = upcoming.slice().sort((a, b) => a.datum.localeCompare(b.datum) || a.uhrzeit_start.localeCompare(b.uhrzeit_start));
  } else if (terminFilter === 'vergangen') {
    visible = past.slice().sort((a, b) => b.datum.localeCompare(a.datum));
  } else {
    visible = all.slice().sort((a, b) => b.datum.localeCompare(a.datum));
  }

  const next = upcoming.slice().sort((a, b) => a.datum.localeCompare(b.datum))[0];
  const nextLabel = next ? formatDateDE(next.datum) : '–';

  const container = document.getElementById('tab-termine');
  const listHtml = visible.length === 0
    ? '<div class="empty"><p>Keine Termine' + (terminFilter !== 'alle' ? ' (' + terminFilter + ')' : '') + '.</p></div>'
    : '<div class="termin-list">' + visible.map(renderTerminCard).join('') + '</div>';

  container.innerHTML =
    '<div class="stats">' +
      '<div class="stat"><div class="stat-label">Kommend</div><div class="stat-value">' + upcoming.length + '</div></div>' +
      '<div class="stat"><div class="stat-label">Vergangen</div><div class="stat-value">' + past.length + '</div></div>' +
      '<div class="stat"><div class="stat-label">Nächster</div><div class="stat-value" style="font-size:14px;font-weight:500;">' + esc(nextLabel) + '</div></div>' +
    '</div>' +
    '<div class="toolbar">' +
      '<div class="filter-pills">' +
        '<button class="filter-pill ' + (terminFilter === 'kommend' ? 'active' : '') + '" data-tfilter="kommend">Kommend</button>' +
        '<button class="filter-pill ' + (terminFilter === 'vergangen' ? 'active' : '') + '" data-tfilter="vergangen">Vergangen</button>' +
        '<button class="filter-pill ' + (terminFilter === 'alle' ? 'active' : '') + '" data-tfilter="alle">Alle</button>' +
      '</div>' +
      '<div style="flex:1;"></div>' +
      '<button class="btn btn-primary" id="termin-add">+ Termin hinzufügen</button>' +
    '</div>' +
    listHtml;

  container.querySelectorAll('[data-tfilter]').forEach(btn => {
    btn.onclick = () => { terminFilter = btn.dataset.tfilter; renderTermineTab(); };
  });
  document.getElementById('termin-add').onclick = () => openTerminModal();
  container.querySelectorAll('[data-termin-id]').forEach(card => {
    card.onclick = () => openTerminModal(card.dataset.terminId);
  });
}

function renderTerminCard(t) {
  const d = parseISODate(t.datum);
  const day = d ? d.getDate() : '?';
  const month = d ? MONATE_KURZ[d.getMonth()] : '';
  const past = isPastDate(t.datum);

  const counts = { zugesagt: 0, fraglich: 0, abgesagt: 0, unbekannt: 0 };
  (t.anwesenheit || []).forEach(a => { if (counts[a.status] != null) counts[a.status]++; });

  const time = t.uhrzeit_start + (t.uhrzeit_ende ? '–' + t.uhrzeit_ende : '');
  const ortLabel = t.typ === 'spiel'
    ? (t.heimspiel ? 'Heim' : 'Auswärts') + (t.ort ? ' · ' + t.ort : '')
    : t.ort;

  let awStr = '<strong>' + counts.zugesagt + '</strong> zugesagt';
  if (counts.fraglich) awStr += ' · ' + counts.fraglich + ' fraglich';
  if (counts.abgesagt) awStr += ' · ' + counts.abgesagt + ' abgesagt';
  if (counts.unbekannt && !past) awStr += ' · ' + counts.unbekannt + ' offen';

  return '<div class="termin-card ' + (past ? 'past' : '') + '" data-termin-id="' + esc(t.id) + '">' +
    '<div class="termin-date">' +
      '<span class="termin-date-d">' + day + '</span>' +
      '<span class="termin-date-m">' + esc(month) + '</span>' +
    '</div>' +
    '<div class="termin-body">' +
      '<div class="termin-titel">' +
        '<span class="termin-typ-badge termin-typ-' + esc(t.typ) + '">' + esc(TYP_LABEL[t.typ] || t.typ) + '</span>' +
        esc(t.titel || '(ohne Titel)') +
      '</div>' +
      '<div class="termin-meta">' +
        '<span>' + esc(time) + '</span>' +
        (ortLabel ? '<span>' + esc(ortLabel) + '</span>' : '') +
      '</div>' +
    '</div>' +
    '<div class="termin-aw">' + awStr + '</div>' +
  '</div>';
}

function openTerminModal(id) {
  editingTerminId = id || null;
  const isEdit = !!id;
  if (isEdit) {
    const orig = db.termine.find(t => t.id === id);
    if (!orig) return;
    pendingTermin = JSON.parse(JSON.stringify(orig));
  } else {
    pendingTermin = mkTermin(db.meta.active_mannschaft_id, {});
  }

  document.getElementById('termin-modal-title').textContent = isEdit ? 'Termin bearbeiten' : 'Termin hinzufügen';
  document.getElementById('termin-modal-delete').style.visibility = isEdit ? 'visible' : 'hidden';

  const body = document.getElementById('termin-modal-body');
  body.innerHTML =
    '<div class="form-row"><label for="t-typ">Art</label>' +
      '<select id="t-typ">' +
      TYP_LIST.map(t => '<option value="' + t + '" ' + (pendingTermin.typ === t ? 'selected' : '') + '>' + TYP_LABEL[t] + '</option>').join('') +
      '</select></div>' +
    '<div class="form-row"><label for="t-datum">Datum</label>' +
      '<input type="date" id="t-datum" value="' + esc(pendingTermin.datum) + '" required></div>' +
    '<div class="form-row"><label for="t-uhrzeit-start">Uhrzeit</label>' +
      '<div style="display:flex; gap:6px; align-items:center;">' +
        '<input type="time" id="t-uhrzeit-start" value="' + esc(pendingTermin.uhrzeit_start) + '" required style="flex:0 1 auto;">' +
        '<span style="color: var(--text-2); font-size: 12px;">bis</span>' +
        '<input type="time" id="t-uhrzeit-ende" value="' + esc(pendingTermin.uhrzeit_ende) + '" style="flex:0 1 auto;">' +
      '</div></div>' +
    '<div class="form-row"><label for="t-titel">Titel</label>' +
      '<input type="text" id="t-titel" value="' + esc(pendingTermin.titel) + '" placeholder="z.B. Passspiel & Pressing" required></div>' +
    '<div class="form-row"><label for="t-ort">Ort</label>' +
      '<input type="text" id="t-ort" value="' + esc(pendingTermin.ort) + '" placeholder="z.B. Platz 2"></div>' +
    '<div class="conditional-row" id="row-gegner"><label for="t-gegner">Gegner</label>' +
      '<input type="text" id="t-gegner" value="' + esc(pendingTermin.gegner) + '" placeholder="z.B. FC Nachbar"></div>' +
    '<div class="conditional-row" id="row-heim"><label>Heim/Auswärts</label>' +
      '<div class="inline-check">' +
        '<input type="checkbox" id="t-heim" ' + (pendingTermin.heimspiel ? 'checked' : '') + '>' +
        '<label for="t-heim">Heimspiel</label>' +
      '</div></div>' +
    '<div class="form-row"><label for="t-notizen">Notizen</label>' +
      '<textarea id="t-notizen" placeholder="Fokus, Ergebnis, Bemerkungen …">' + esc(pendingTermin.notizen) + '</textarea></div>' +
    renderAnwesenheitInModal(pendingTermin);

  function updateConditional() {
    const showSpiel = document.getElementById('t-typ').value === 'spiel';
    document.getElementById('row-gegner').classList.toggle('hidden', !showSpiel);
    document.getElementById('row-heim').classList.toggle('hidden', !showSpiel);
  }
  updateConditional();
  document.getElementById('t-typ').onchange = updateConditional;

  attachAwHandlers(body);
  document.getElementById('termin-modal').classList.add('open');
  setTimeout(() => { const el = document.getElementById('t-titel'); if (el) el.focus(); }, 50);
}

function renderAnwesenheitInModal(termin) {
  const teamSp = (db.spieler || []).filter(s => s.mannschaft_id === termin.mannschaft_id);
  teamSp.sort((a, b) => a.trikotnummer - b.trikotnummer);

  if (!termin.anwesenheit) termin.anwesenheit = [];
  teamSp.forEach(s => {
    if (!termin.anwesenheit.find(a => a.spieler_id === s.id)) {
      termin.anwesenheit.push({ spieler_id: s.id, status: 'unbekannt' });
    }
  });

  const awMap = {};
  termin.anwesenheit.forEach(a => { awMap[a.spieler_id] = a.status; });

  const counts = { zugesagt: 0, fraglich: 0, abgesagt: 0, unbekannt: 0 };
  teamSp.forEach(s => {
    const st = awMap[s.id] || 'unbekannt';
    if (counts[st] != null) counts[st]++;
  });

  if (teamSp.length === 0) {
    return '<div class="anwesenheit-section"><p style="font-size: 12px; color: var(--text-2); margin: 0;">Noch keine Spieler im Kader.</p></div>';
  }

  return '<div class="anwesenheit-section">' +
    '<div class="anwesenheit-head">' +
      '<p class="anwesenheit-title">Anwesenheit (' + teamSp.length + ')</p>' +
      '<span class="anwesenheit-summary">' +
        counts.zugesagt + ' zu · ' + counts.fraglich + ' fr · ' + counts.abgesagt + ' ab · ' + counts.unbekannt + ' offen' +
      '</span>' +
    '</div>' +
    '<div class="anwesenheit-list">' +
    teamSp.map(s => {
      const st = awMap[s.id] || 'unbekannt';
      return '<div class="aw-row">' +
        '<span class="aw-num">' + esc(s.trikotnummer) + '</span>' +
        '<span class="aw-name">' + esc(s.vorname) + ' ' + esc(s.nachname) + '</span>' +
        '<span class="aw-pos">' + esc(s.position) + '</span>' +
        '<div class="aw-buttons">' +
          '<button type="button" class="aw-btn aw-zu ' + (st === 'zugesagt' ? 'active' : '') + '" data-spieler-id="' + esc(s.id) + '" data-status="zugesagt" title="Zugesagt">✓</button>' +
          '<button type="button" class="aw-btn aw-fr ' + (st === 'fraglich' ? 'active' : '') + '" data-spieler-id="' + esc(s.id) + '" data-status="fraglich" title="Fraglich">?</button>' +
          '<button type="button" class="aw-btn aw-ab ' + (st === 'abgesagt' ? 'active' : '') + '" data-spieler-id="' + esc(s.id) + '" data-status="abgesagt" title="Abgesagt">×</button>' +
        '</div>' +
      '</div>';
    }).join('') +
    '</div>' +
  '</div>';
}

function attachAwHandlers(body) {
  body.querySelectorAll('.aw-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.preventDefault();
      const spielerId = btn.dataset.spielerId;
      const status = btn.dataset.status;
      const aw = (pendingTermin.anwesenheit || []).find(a => a.spieler_id === spielerId);
      if (!aw) return;
      if (aw.status === status) {
        aw.status = 'unbekannt';
        btn.classList.remove('active');
      } else {
        aw.status = status;
        btn.parentElement.querySelectorAll('.aw-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      updateAwSummary();
    };
  });
}

function updateAwSummary() {
  const counts = { zugesagt: 0, fraglich: 0, abgesagt: 0, unbekannt: 0 };
  (pendingTermin.anwesenheit || []).forEach(a => { if (counts[a.status] != null) counts[a.status]++; });
  const sumEl = document.querySelector('#termin-modal .anwesenheit-summary');
  if (sumEl) {
    sumEl.textContent = counts.zugesagt + ' zu · ' + counts.fraglich + ' fr · ' + counts.abgesagt + ' ab · ' + counts.unbekannt + ' offen';
  }
}

function closeTerminModal() {
  document.getElementById('termin-modal').classList.remove('open');
  editingTerminId = null;
  pendingTermin = null;
}

function saveTerminModal() {
  const g = (id) => document.getElementById(id);
  const typ = g('t-typ').value;
  pendingTermin.typ = typ;
  pendingTermin.datum = g('t-datum').value;
  pendingTermin.uhrzeit_start = g('t-uhrzeit-start').value;
  pendingTermin.uhrzeit_ende = g('t-uhrzeit-ende').value;
  pendingTermin.titel = g('t-titel').value.trim();
  pendingTermin.ort = g('t-ort').value.trim();
  pendingTermin.gegner = typ === 'spiel' ? g('t-gegner').value.trim() : '';
  pendingTermin.heimspiel = typ === 'spiel' ? g('t-heim').checked : true;
  pendingTermin.notizen = g('t-notizen').value.trim();

  if (!pendingTermin.datum || !pendingTermin.uhrzeit_start || !pendingTermin.titel) {
    alert('Datum, Startzeit und Titel sind Pflicht.');
    return;
  }

  if (editingTerminId) {
    const idx = db.termine.findIndex(t => t.id === editingTerminId);
    if (idx >= 0) db.termine[idx] = pendingTermin;
  } else {
    db.termine.push(pendingTermin);
  }
  saveDb();
  renderTermineTab();
  closeTerminModal();
}

function deleteTerminModal() {
  if (!editingTerminId) return;
  const t = db.termine.find(x => x.id === editingTerminId);
  if (!t) return;
  if (!confirm('Termin "' + (t.titel || formatDateDE(t.datum)) + '" wirklich löschen?')) return;
  db.termine = db.termine.filter(x => x.id !== editingTerminId);
  saveDb();
  renderTermineTab();
  closeTerminModal();
}

    cardsHtml;

    db.aufstellungen.push(fresh);
    saveDb();
    openAufstellungEditor(fresh.id);
  };

    card.onclick = () => openAufstellungEditor(card.dataset.aufstId);
  });

function openAufstellungEditor(id) {
  editingAufstellungId = id;
  selectedSlotIdx = null;
  aufstellungenView = 'edit';
  renderAufstellungenTab();
}

function closeAufstellungEditor() {
  aufstellungenView = 'list';
  editingAufstellungId = null;
  selectedSlotIdx = null;
  renderAufstellungenTab();
}

function renderAufstellungEditor() {
  const a = db.aufstellungen.find(x => x.id === editingAufstellungId);
  if (!a) { closeAufstellungEditor(); return; }
  const formationSlots = FORMATIONS[a.formation] || [];
  const pos = a.positionen || {};

  const spielerToSlot = {};
  Object.keys(pos).forEach(k => { spielerToSlot[pos[k]] = parseInt(k, 10); });

  const teamSp = db.spieler.filter(s => s.mannschaft_id === a.mannschaft_id);
  teamSp.sort((x, y) => x.trikotnummer - y.trikotnummer);

  const filledCount = Object.keys(pos).length;
  const pitchSvg = renderPitchSvg(formationSlots, pos, teamSp);

  const kaderHtml = teamSp.length === 0
    ? '<p style="font-size: 12px; color: var(--text-3); padding: 6px;">Noch keine Spieler im Kader.</p>'
    : teamSp.map(s => {
        const slot = spielerToSlot[s.id];
        const placed = slot != null;
        const slotLabel = placed ? formationSlots[slot].label : '';
        return '<div class="kader-card ' + (placed ? 'placed' : '') + '" data-spieler-id="' + esc(s.id) + '">' +
          '<span class="kader-num">' + esc(s.trikotnummer) + '</span>' +
          '<span class="kader-name">' + esc(s.vorname) + ' ' + esc(s.nachname) + '</span>' +
          (placed
            ? '<span class="kader-slot-badge">' + esc(slotLabel) + '</span>'
            : '<span class="kader-pos">' + esc(s.position) + '</span>') +
        '</div>';
      }).join('');

  const instruction = selectedSlotIdx != null
    ? 'Spieler aus dem Kader wählen → wird auf <strong>' + esc(formationSlots[selectedSlotIdx].label) + '</strong> gesetzt'
    : 'Position auf der Taktiktafel klicken, dann Spieler aus dem Kader wählen';

  const container = document.getElementById('tab-aufstellungen');
  container.innerHTML =
    '<div class="aufst-editor-top">' +
      '<button class="aufst-back-btn" id="aufst-back">← Aufstellungen</button>' +
      '<input type="text" id="aufst-name" value="' + esc(a.name) + '" placeholder="Name">' +
      '<select id="aufst-formation" title="Formation">' +
        FORMATION_NAMES.map(f => '<option value="' + f + '" ' + (a.formation === f ? 'selected' : '') + '>' + f + '</option>').join('') +
      '</select>' +
      '<select id="aufst-variante" title="Variante">' +
        VARIANTEN.map(v => '<option value="' + v + '" ' + (a.variante === v ? 'selected' : '') + '>' + v + '</option>').join('') +
      '</select>' +
      '<div class="aufst-spacer"></div>' +
      '<div class="aufst-count"><strong>' + filledCount + '</strong>/' + formationSlots.length + '</div>' +
      '<button class="btn btn-danger" id="aufst-delete">Löschen</button>' +
    '</div>' +
    '<div class="aufst-layout">' +
      '<div class="aufst-pitch-wrap">' +
        '<div class="aufst-instruction ' + (selectedSlotIdx != null ? 'active' : '') + '">' + instruction + '</div>' +
        pitchSvg +
      '</div>' +
      '<div class="aufst-sidebar">' +
        '<p class="aufst-sidebar-h">Kader (' + teamSp.length + ')</p>' +
        '<div class="kader-list">' + kaderHtml + '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('aufst-back').onclick = closeAufstellungEditor;
  document.getElementById('aufst-delete').onclick = () => {
    if (!confirm('Aufstellung "' + a.name + '" wirklich löschen?')) return;
    db.aufstellungen = db.aufstellungen.filter(x => x.id !== a.id);
    saveDb();
    closeAufstellungEditor();
  };

  const nameEl = document.getElementById('aufst-name');
  nameEl.onblur = () => {
    const v = nameEl.value.trim() || 'Unbenannt';
    if (v !== a.name) { a.name = v; saveDb(); }
  };

  document.getElementById('aufst-formation').onchange = (e) => {
    const newFormation = e.target.value;
    if (filledCount > 0 && !confirm('Aktuelle Spieler-Positionen werden zurückgesetzt. Formation auf ' + newFormation + ' wechseln?')) {
      e.target.value = a.formation;
      return;
    }
    a.formation = newFormation;
    a.positionen = {};
    selectedSlotIdx = null;
    saveDb();
    renderAufstellungenTab();
  };

  document.getElementById('aufst-variante').onchange = (e) => {
    a.variante = e.target.value;
    saveDb();
  };

  container.querySelectorAll('[data-slot-idx]').forEach(g => {
    g.onclick = () => {
      const idx = parseInt(g.dataset.slotIdx, 10);
      selectedSlotIdx = (selectedSlotIdx === idx) ? null : idx;
      renderAufstellungenTab();
    };
  });

  container.querySelectorAll('.kader-card').forEach(c => {
    c.onclick = () => {
      const spId = c.dataset.spielerId;
      const currentSlot = spielerToSlot[spId];
      if (selectedSlotIdx != null) {
        if (currentSlot != null) delete a.positionen[currentSlot];
        a.positionen[selectedSlotIdx] = spId;
        selectedSlotIdx = null;
        saveDb();
        renderAufstellungenTab();
      } else if (currentSlot != null) {
        const sp = db.spieler.find(s => s.id === spId);
        if (confirm((sp ? sp.vorname + ' ' + sp.nachname : 'Spieler') + ' aus der Aufstellung nehmen?')) {
          delete a.positionen[currentSlot];
          saveDb();
          renderAufstellungenTab();
        }
      }
    };
  });
}

function renderPitchSvg(slots, positionen, teamSp) {
  const spielerById = {};
  teamSp.forEach(s => { spielerById[s.id] = s; });

  const slotsMarkup = slots.map((slot, i) => {
    const spId = positionen[i];
    const sp = spId ? spielerById[spId] : null;
    const filled = !!sp;
    const selected = selectedSlotIdx === i;
    const cls = ['pitch-slot'];
    cls.push(filled ? 'filled' : 'empty');
    if (selected) cls.push('selected');

    const inner = filled
      ? '<text class="slot-num">' + esc(sp.trikotnummer) + '</text>' +
        '<text class="slot-label" y="10.5">' + esc(sp.nachname.length > 9 ? sp.nachname.slice(0, 8) + '.' : sp.nachname) + '</text>'
      : '<text class="slot-plus">+</text>' +
        '<text class="slot-label" y="10.5">' + esc(slot.label) + '</text>';

    return '<g class="' + cls.join(' ') + '" data-slot-idx="' + i + '" transform="translate(' + slot.x + ',' + slot.y + ')">' +
      '<circle r="6" />' +
      inner +
    '</g>';
  }).join('');

  return '<svg viewBox="0 0 100 150" class="pitch-svg" preserveAspectRatio="xMidYMid meet">' +
    '<defs>' +
      '<linearGradient id="pitch-grad" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#5e8c1f"/>' +
        '<stop offset="1" stop-color="#4a7117"/>' +
      '</linearGradient>' +
      '<pattern id="pitch-stripes" x="0" y="0" width="100" height="20" patternUnits="userSpaceOnUse">' +
        '<rect width="100" height="20" fill="url(#pitch-grad)"/>' +
        '<rect y="0" width="100" height="10" fill="rgba(255,255,255,0.04)"/>' +
      '</pattern>' +
    '</defs>' +
    '<rect width="100" height="150" fill="url(#pitch-stripes)"/>' +
    '<g stroke="white" stroke-width="0.35" fill="none" opacity="0.7" stroke-linejoin="round">' +
      '<rect x="1" y="1" width="98" height="148" />' +
      '<line x1="1" y1="75" x2="99" y2="75" />' +
      '<circle cx="50" cy="75" r="10" />' +
      '<circle cx="50" cy="75" r="0.6" fill="white" stroke="none"/>' +
      '<rect x="22" y="1" width="56" height="20" />' +
      '<rect x="36" y="1" width="28" height="7" />' +
      '<path d="M 38 21 A 12 12 0 0 0 62 21" />' +
      '<rect x="22" y="129" width="56" height="20" />' +
      '<rect x="36" y="142" width="28" height="7" />' +
      '<path d="M 38 129 A 12 12 0 0 1 62 129" />' +
    '</g>' +
    '<g>' + slotsMarkup + '</g>' +
  '</svg>';
}

function renderUebungenTab() {
  const all = (db.uebungen || []).slice();
  const q = uebungSearch.toLowerCase().trim();

  let filtered = uebungKatFilter === 'alle' ? all : all.filter(u => u.kategorie === uebungKatFilter);
  if (q) {
    filtered = filtered.filter(u => (u.name + ' ' + (u.beschreibung || '') + ' ' + (u.materialien || []).join(' ')).toLowerCase().includes(q));
  }
  filtered.sort((a, b) => a.name.localeCompare(b.name, 'de'));

  const katCounts = { alle: all.length };
  UEBUNG_KATEGORIEN.forEach(k => { katCounts[k] = all.filter(u => u.kategorie === k).length; });

  const container = document.getElementById('tab-uebungen');
  const emptyHtml = q || uebungKatFilter !== 'alle'
    ? '<div class="empty"><p>Keine Übungen gefunden.</p><p style="font-size:12px;">Filter zurücksetzen oder neue Übung anlegen.</p></div>'
    : '<div class="empty"><p>Noch keine Übungen.</p><p style="font-size:12px;">Du kannst eigene anlegen oder die mitgelieferten Beispiele laden.</p><button class="btn btn-primary" id="uebung-load-examples" style="margin-top: 14px;">8 Beispiel-Übungen laden</button></div>';
  const gridHtml = filtered.length === 0 ? emptyHtml : '<div class="uebung-grid">' + filtered.map(renderUebungCard).join('') + '</div>';

  const seedNamesLower = getSeedUebungen().map(u => u.name.toLowerCase());
  const existingNamesLower = new Set((db.uebungen || []).map(u => u.name.toLowerCase()));
  const missingSeeds = seedNamesLower.filter(n => !existingNamesLower.has(n)).length;
  const toolbarLoadBtn = missingSeeds > 0
    ? '<button class="btn" id="uebung-load-examples-toolbar" title="Mitgelieferte Beispiel-Übungen ergänzen">+ ' + missingSeeds + ' Beispiele laden</button>'
    : '';

  container.innerHTML =
    '<div class="toolbar">' +
      '<input type="search" id="uebung-search" placeholder="Übungen durchsuchen …" value="' + esc(uebungSearch) + '" style="flex: 0 1 280px; padding: 7px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text);">' +
      '<div style="flex:1;"></div>' +
      toolbarLoadBtn +
      '<button class="btn btn-primary" id="uebung-add">+ Übung hinzufügen</button>' +
    '</div>' +
    '<div class="filter-pills" style="margin-bottom: 14px;">' +
      '<button class="filter-pill ' + (uebungKatFilter === 'alle' ? 'active' : '') + '" data-katfilter="alle">Alle (' + katCounts.alle + ')</button>' +
      UEBUNG_KATEGORIEN.map(k =>
        '<button class="filter-pill ' + (uebungKatFilter === k ? 'active' : '') + '" data-katfilter="' + k + '">' + UEBUNG_KAT_LABEL[k] + ' (' + katCounts[k] + ')</button>'
      ).join('') +
    '</div>' +
    gridHtml;

  const searchEl = document.getElementById('uebung-search');
  searchEl.oninput = () => { uebungSearch = searchEl.value; renderUebungenTab(); };
  searchEl.onfocus = () => searchEl.setSelectionRange(searchEl.value.length, searchEl.value.length);
  if (q) setTimeout(() => searchEl.focus(), 0);

  document.getElementById('uebung-add').onclick = () => openUebungModal();
  const loadSeedsFn = () => {
    const existing = new Set((db.uebungen || []).map(u => u.name.toLowerCase()));
    const seeds = getSeedUebungen().filter(u => !existing.has(u.name.toLowerCase()));
    if (seeds.length === 0) {
      alert('Beispiele sind bereits geladen.');
      return;
    }
    db.uebungen = (db.uebungen || []).concat(seeds);
    saveDb();
    renderUebungenTab();
  };
  const loadBtn = document.getElementById('uebung-load-examples');
  if (loadBtn) loadBtn.onclick = loadSeedsFn;
  const loadBtnToolbar = document.getElementById('uebung-load-examples-toolbar');
  if (loadBtnToolbar) loadBtnToolbar.onclick = loadSeedsFn;
  container.querySelectorAll('[data-katfilter]').forEach(btn => {
    btn.onclick = () => { uebungKatFilter = btn.dataset.katfilter; renderUebungenTab(); };
  });
  container.querySelectorAll('[data-uebung-id]').forEach(card => {
    card.onclick = () => openUebungModal(card.dataset.uebungId);
  });
}

function resizeImageToDataUrl(file, maxWidth, quality, callback) {
  if (!file.type || file.type.indexOf('image/') !== 0) {
    alert('Nur Bilddateien (JPG, PNG, GIF, WebP) werden unterstützt.');
    return;
  }
  if (file.size > 12 * 1024 * 1024) {
    alert('Bild zu groß (max 12 MB).');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(w); canvas.height = Math.round(h);
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      try {
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        callback(dataUrl);
      } catch (err) {
        alert('Bild konnte nicht verarbeitet werden: ' + err.message);
      }
    };
    img.onerror = () => alert('Bild konnte nicht geladen werden.');
    img.src = e.target.result;
  };
  reader.onerror = () => alert('Datei konnte nicht gelesen werden.');
  reader.readAsDataURL(file);
}

function renderUebungImagesSection() {
  const imgs = (pendingUebung && pendingUebung.bilder) || [];
  let html = '<div class="form-row" style="grid-template-columns: 1fr; margin-bottom: 11px;">' +
    '<label style="margin-bottom: 6px;">Bilder (max 2, optional)</label>' +
    '<div class="u-img-grid" id="u-img-grid">';
  if (imgs.length === 0) {
    html += '<button type="button" class="u-img-upload full" data-img-upload>+ Bild hinzufügen</button>';
  } else {
    imgs.forEach((url, i) => {
      const fullCls = imgs.length === 1 ? ' u-img-thumb-full' : '';
      html += '<div class="u-img-thumb' + fullCls + '">' +
        '<img src="' + esc(url) + '" alt="Bild ' + (i + 1) + '">' +
        '<button type="button" class="u-img-remove" data-img-idx="' + i + '" title="Entfernen">×</button>' +
      '</div>';
    });
    if (imgs.length < 2) {
      html += '<button type="button" class="u-img-upload" data-img-upload>+ Bild hinzufügen</button>';
    }
  }
  html += '</div></div>';
  return html;
}

function attachUebungImageHandlers() {
  const grid = document.getElementById('u-img-grid');
  if (!grid) return;
  grid.querySelectorAll('[data-img-upload]').forEach(btn => {
    btn.onclick = () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        resizeImageToDataUrl(file, 600, 0.7, (dataUrl) => {
          if (!pendingUebung.bilder) pendingUebung.bilder = [];
          if (pendingUebung.bilder.length >= 2) return;
          pendingUebung.bilder.push(dataUrl);
          refreshUebungImages();
        });
      };
      input.click();
    };
  });
  grid.querySelectorAll('[data-img-idx]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.imgIdx, 10);
      if (!pendingUebung.bilder) return;
      pendingUebung.bilder.splice(idx, 1);
      refreshUebungImages();
    };
  });
}

function refreshUebungImages() {
  const section = document.getElementById('u-img-section');
  if (!section) return;
  section.outerHTML = '<div id="u-img-section">' + renderUebungImagesSection() + '</div>';
  attachUebungImageHandlers();
}

      '<textarea id="u-coaching" placeholder="Worauf achten, was korrigieren …">' + esc(pendingUebung.coaching_punkte) + '</textarea></div>';

  attachTagInputHandlers();
  attachUebungImageHandlers();
  document.getElementById('uebung-modal').classList.add('open');
  setTimeout(() => document.getElementById('u-name').focus(), 50);
}

function renderTagChip(text, idx) {
  return '<span class="tag-chip" data-tag-idx="' + idx + '">' + esc(text) +
    '<button type="button" class="tag-chip-remove" data-tag-idx="' + idx + '" title="Entfernen">×</button>' +
  '</span>';
}

function refreshTagChips() {
  const wrap = document.getElementById('u-mat-wrap');
  if (!wrap) return;
  const input = document.getElementById('u-mat-input');
  const chips = (pendingUebung.materialien || []).map((m, i) => renderTagChip(m, i)).join('');
  wrap.innerHTML = chips + '<input type="text" class="tag-input" id="u-mat-input" placeholder="Material eingeben + Enter">';
  attachTagInputHandlers();
  const newInput = document.getElementById('u-mat-input');
  if (input === document.activeElement || !input) newInput.focus();
}

function attachTagInputHandlers() {
  const input = document.getElementById('u-mat-input');
  if (!input) return;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const v = input.value.trim();
      if (v) {
        if (!pendingUebung.materialien) pendingUebung.materialien = [];
        pendingUebung.materialien.push(v);
        input.value = '';
        refreshTagChips();
      }
    } else if (e.key === 'Backspace' && !input.value && pendingUebung.materialien && pendingUebung.materialien.length) {
      pendingUebung.materialien.pop();
      refreshTagChips();
    }
  };
  document.querySelectorAll('#u-mat-wrap .tag-chip-remove').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.tagIdx, 10);
      pendingUebung.materialien.splice(idx, 1);
      refreshTagChips();
    };
  });
}

function closeUebungModal() {
  document.getElementById('uebung-modal').classList.remove('open');
  editingUebungId = null;
  pendingUebung = null;
}

function saveUebungModal() {
  const g = (id) => document.getElementById(id);
  const matInput = g('u-mat-input');
  if (matInput && matInput.value.trim()) {
    if (!pendingUebung.materialien) pendingUebung.materialien = [];
    pendingUebung.materialien.push(matInput.value.trim());
  }

  pendingUebung.name = g('u-name').value.trim();
  pendingUebung.kategorie = g('u-kategorie').value;
  pendingUebung.dauer_min = Math.max(1, parseInt(g('u-dauer').value, 10) || 15);
  pendingUebung.spieler_min = Math.max(1, parseInt(g('u-spieler-min').value, 10) || 1);
  pendingUebung.spieler_max = Math.max(pendingUebung.spieler_min, parseInt(g('u-spieler-max').value, 10) || pendingUebung.spieler_min);
  pendingUebung.beschreibung = g('u-beschreibung').value.trim();
  pendingUebung.coaching_punkte = g('u-coaching').value.trim();

  if (!pendingUebung.name) {
    alert('Name ist Pflicht.');
    return;
  }

  if (editingUebungId) {
    const idx = db.uebungen.findIndex(u => u.id === editingUebungId);
    if (idx >= 0) db.uebungen[idx] = pendingUebung;
  } else {
    db.uebungen.push(pendingUebung);
  }
  saveDb();
  renderUebungenTab();
  closeUebungModal();
}

function deleteUebungModal() {
  if (!editingUebungId) return;
  const u = db.uebungen.find(x => x.id === editingUebungId);
  if (!u) return;
  if (!confirm('Übung "' + u.name + '" wirklich löschen?')) return;
  db.uebungen = db.uebungen.filter(x => x.id !== editingUebungId);
  saveDb();
  renderUebungenTab();
  closeUebungModal();
}

function getActiveTrainingsplaene() {
  return (db.trainingsplaene || []).filter(t => t.mannschaft_id === db.meta.active_mannschaft_id);
}

function computePhaseDauer(phase) {
  return (phase.items || []).reduce((sum, it) => {
    const u = db.uebungen.find(x => x.id === it.uebung_id);
    const d = (it.dauer_override != null) ? it.dauer_override : (u ? u.dauer_min : 0);
    return sum + (d || 0);
  }, 0);
}

function computeTpDauer(tp) {
  return (tp.phasen || []).reduce((sum, p) => sum + computePhaseDauer(p), 0);
}

function countTpItems(tp) {
  return (tp.phasen || []).reduce((sum, p) => sum + (p.items || []).length, 0);
}

function renderTrainingsplaeneTab() {
  if (trainingsplaeneView === 'edit' && editingTrainingsplanId) {
    renderTrainingsplanEditor();
  } else {
    renderTrainingsplaeneList();
  }
}

function renderTrainingsplaeneList() {
  const list = getActiveTrainingsplaene().slice();
  list.sort((a, b) => (b.datum || '').localeCompare(a.datum || ''));

  const container = document.getElementById('tab-trainingsplaene');
  const cardsHtml = list.length === 0
    ? '<div class="empty"><p>Noch keine Trainingspläne.</p><p style="font-size:12px;">Lege einen neuen an, um Übungen zu einer Einheit zu komponieren.</p></div>'
    : '<div class="tp-list-grid">' + list.map(tp => {
        const dauer = computeTpDauer(tp);
        const items = countTpItems(tp);
        const datumStr = tp.datum ? formatDateDE(tp.datum) : 'Ohne Datum';
        return '<div class="tp-list-card" data-tp-id="' + esc(tp.id) + '">' +
          '<p class="tp-list-card-name">' + esc(tp.name) + '</p>' +
          '<div class="tp-list-card-meta">' +
            '<span>📅 ' + esc(datumStr) + '</span>' +
            '<span>⏱ <strong>' + dauer + ' min</strong></span>' +
            '<span>📋 ' + items + ' Übung' + (items === 1 ? '' : 'en') + '</span>' +
          '</div>' +
        '</div>';
      }).join('') + '</div>';

  container.innerHTML =
    '<div class="toolbar">' +
      '<div style="font-size: 13px; color: var(--text-2);">' + list.length + ' ' + (list.length === 1 ? 'Trainingsplan' : 'Trainingspläne') + '</div>' +
      '<div style="flex:1;"></div>' +

    '</div>' +
    cardsHtml;

  document.getElementById('tp-add').onclick = () => {
    const fresh = mkTrainingsplan(db.meta.active_mannschaft_id, {});

    saveDb();
    openTrainingsplanEditor(fresh.id);
  };

    card.onclick = () => openTrainingsplanEditor(card.dataset.tpId);
  });
